name: Set up the TypeScript workspace
description: Installs the pinned Node.js and pnpm versions, restores the pnpm store, and installs dependencies.

runs:
  using: composite
  steps:
    # The pnpm version is read from the `packageManager` field of the root
    # package.json, so CI can never drift from the version developers run.
    #
    # Source: ADR-0009, "Package manager: pnpm 10 workspaces, enforced by the
    # `packageManager` field".
    - name: Install pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    # `.nvmrc` carries the Node.js baseline. Reading the file instead of
    # repeating the number here keeps a single source of truth.
    #
    # Source: ADR-0009, "Node.js 24 (active LTS), enforced by `.nvmrc`, the
    # `engines` field, and the CI matrix".
    - name: Install Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version-file: .nvmrc
        cache: pnpm

    # A frozen lockfile is what makes a build reproducible from source alone.
    #
    # Source: architecture/environments-and-delivery.md, section "17. Supply
    # Chain", "Lock dependencies".
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
