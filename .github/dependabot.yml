version: 2

# Every GitHub Action in this repository is pinned to a commit SHA, which is what
# the supply-chain policy requires but also what freezes an action at a version
# that will eventually carry a known vulnerability. Dependabot is the mechanism
# that moves those pins forward; without it, SHA pinning silently becomes
# "permanently outdated".
#
# Source: architecture/environments-and-delivery.md, section "17. Supply Chain",
# "Pin GitHub Actions to trusted versions or commit SHAs according to policy" and
# "Scan dependencies, secrets, shell scripts, cloud configuration, and containers".
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/setup-workspace
    schedule:
      interval: monthly
    commit-message:
      prefix: ci

  # Grouped into a single pull request so that routine dependency movement costs
  # one review rather than one review per package.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      workspace:
        patterns: ['*']
    commit-message:
      prefix: deps
    ignore:
      # ADR-0009 pins TypeScript to 5.9.x deliberately: typescript-eslint
      # declares a peer range of ">=4.8.4 <6.1.0" and cannot lint a TypeScript 7
      # project, and openapi-typescript@7.13.0 crashes outright against the
      # TypeScript 7 compiler API (`ts.factory` is undefined at the call site
      # openapi-typescript uses). A grouped update silently carries typescript
      # past 6.x for every package at once and breaks both.
      #
      # Remove this ignore rule only together with revisiting ADR-0009, once
      # typescript-eslint and openapi-typescript support the newer major.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
