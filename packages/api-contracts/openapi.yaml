      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: taskId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: rescheduleTask
      tags: [Tasks]
      summary: Reschedule a task
      description: |
        Updates `dueDate`/`timeWindow` only, sharing `EditTask`'s underlying
        update and the same `'planned'`/`'suggested'`-only precondition, kept
        as a distinct command because rescheduling is a distinct first-class
        user action.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RescheduleTaskRequest'
