openapi: 3.1.0

info:
  title: Verdery API
  version: 1.0.0
  summary: Garden mapping, care records, and recommendations
  description: |
    The external contract shared by the native Apple and web applications.

    This document is the machine-readable source of truth for paths, schemas,
    error envelopes, pagination, idempotency, and concurrency headers. Generated
    clients are wrapped by handwritten application gateways and are never edited
    by hand.

    Conventions:

    - Paths use plural lowercase nouns; JSON fields use `camelCase`.
    - Identifiers are opaque UUIDv7 strings.
    - Timestamps are RFC 3339 in UTC.
    - Measurements are SI with explicit unit metadata where ambiguity exists.
    - Geometry always travels inside an envelope naming its coordinate space,
      because GeoJSON alone cannot say whether coordinates are local metres or
      longitude and latitude.

    Source: architecture/api-design.md.
  license:
    name: UNLICENSED
    identifier: LicenseRef-Proprietary

servers:
  - url: /v1
    description: Version 1

tags:
  - name: Operations
    description: Service health and readiness, used by infrastructure rather than by end users.
  - name: Gardens
    description: Garden lifecycle — list, create, view, rename, archive, and request deletion.
  - name: Authentication
    description: Web session exchange for the browser client. Native clients use a Firebase ID token directly and never call these.
  - name: Map
    description: The canonical 2D garden map — objects, their categories and geometry, and the single revision-aware command endpoint that mutates them.
  - name: Plants
    description: Plant inventory within a garden — placement on the map, photos, taxonomy identification, lifecycle stage, and status.
  - name: Observations
    description: The append-only garden and plant observation history, including per-photo image-analysis results and immutable corrections.
  - name: Tasks
    description: Garden care tasks — manual creation, scheduling, completion, and file attachments.
  - name: Media
    description: Garden-scoped media upload registration, backend-authorized resumable upload sessions, client-triggered completion verification, status, and short-lived authorized download access.
  - name: Synchronization
    description: The native offline outbox protocol — client installation registration, bounded batched push of client commands, resumable pull of the server change log, and cheap re-acknowledgement of already-submitted operations.

paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Operations]
      summary: Liveness probe
      description: |
        Reports whether the process is running. Never checks dependencies, so a
        degraded database does not cause the platform to restart a healthy
        process.
      security: []
      responses:
        '200':
          description: The process is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResult'
        '500':
          $ref: '#/components/responses/InternalError'

  /health/ready:
    get:
      operationId: getReadiness
      tags: [Operations]
      summary: Readiness probe
      description: |
        Reports whether the service can serve traffic, including its required
        dependencies. Returns `503` when a required dependency is unavailable so
        that the platform stops routing requests to this instance.
      security: []
      responses:
        '200':
          description: The service is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResult'
        '503':
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResult'

  /auth/session:
    post:
      operationId: createSession
      tags: [Authentication]
      summary: Exchange a Firebase ID token for a web session
      description: |
        The browser signs in with a Firebase provider client-side, then
        submits the resulting ID token here. The server verifies it and
        responds with a `Secure`, `HttpOnly` session cookie plus a
        readable CSRF cookie; the ID token itself never becomes a
        persistent browser credential.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow".
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '204':
          description: Session established. Cookies are set on the response.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      operationId: endSession
      tags: [Authentication]
      summary: Log out
      description: |
        Clears the session and CSRF cookies and revokes the underlying
        Firebase refresh tokens. Idempotent: succeeds even when no valid
        session cookie is present, so a client can always clear a broken
        session state.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow", step 6.
      security: []
      responses:
        '204':
          description: Session cleared.
        '403':
          $ref: '#/components/responses/Forbidden'

  /gardens:
    get:
      operationId: listGardens
      tags: [Gardens]
      summary: List the caller's gardens
      description: |
        Returns every garden the authenticated profile has active membership
        in, regardless of lifecycle state. Most recently created first, or —
        when `nameQuery` is given — ranked by trigram similarity against
        `name` instead, most-similar first.

        Source: implementation-plan.md work packages P2-API-01, P4-SEARCH-01.
      parameters:
        - name: nameQuery
          in: query
          required: false
          description: Trigram-fuzzy match against the garden's name. Omit to list every garden the caller can see, most recently created first.
          schema:
            type: string
            maxLength: 120
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The caller's gardens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createGarden
      tags: [Gardens]
      summary: Create a garden
      description: |
        Creates a garden and grants the caller the owner role on it in the
        same transaction. Every garden has exactly one owner at creation.

        Source: implementation-plan.md work package P2-API-01;
        architecture/identity-and-authorization.md, section "8. Garden Roles".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGardenRequest'
      responses:
        '201':
          description: The created garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getGarden
      tags: [Gardens]
      summary: Get a garden
      description: |
        Returns a garden the caller has active membership in. Existence is
        concealed as `404` for a profile with no membership on this garden.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01.
      responses:
        '200':
          description: The requested garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: renameGarden
      tags: [Gardens]
      summary: Rename a garden
      description: |
        Renaming is an owner-only garden setting, distinct from editing garden
        content. Existence is concealed as `404` for a non-member; an editor
        or viewer member instead receives `403`, since they already know the
        garden exists.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01;
        architecture/identity-and-authorization.md, section "8. Garden Roles".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameGardenRequest'
      responses:
        '200':
          description: The renamed garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/archive:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: archiveGarden
      tags: [Gardens]
      summary: Archive a garden
      description: |
        Owner-only lifecycle command. Archiving an already-archived garden
        under a new idempotency key is a domain conflict, not a silent no-op.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The archived garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/delete-request:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: requestGardenDeletion
      tags: [Gardens]
      summary: Request garden deletion
      description: |
        Owner-only lifecycle command. Starts the deletion workflow; it does
        not delete the garden immediately. Purge after the recovery window is
        a separate, not-yet-implemented asynchronous workflow.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01;
        architecture/data-and-geospatial-design.md, section "15. Deletion".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The garden, now in the deletion_requested lifecycle state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/map:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: minX
        in: query
        required: false
        description: |
          Viewport bounding box in garden-local metres, for large gardens.
          All four bounds are required together or omitted together; a
          partial set is a `400`.
        schema:
          type: number
      - name: minY
        in: query
        required: false
        schema:
          type: number
      - name: maxX
        in: query
        required: false
        schema:
          type: number
      - name: maxY
        in: query
        required: false
        schema:
          type: number

    get:
      operationId: getGardenMap
      tags: [Map]
      summary: Get the canonical garden map
      description: |
        Returns every active object in the garden's local coordinate space,
        its optional georeference, and a validation summary. Omitting the
        bounding box parameters returns the whole garden — appropriate for
        small and ordinary gardens; large gardens should pass a viewport.

        Source: implementation-plan.md work packages P3-BE-01, P3-DATA-02;
        architecture/map-rendering-and-editing.md, section "6. Hybrid Data Model".
      responses:
        '200':
          description: The garden's map document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenMapDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /gardens/{gardenId}/map/commands:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: submitMapCommand
      tags: [Map]
      summary: Submit one canonical map editor command
      description: |
        A single revision-aware endpoint for every map editing command —
        create, move, replace geometry, edit a vertex, split or join
        linework, change properties, assign a plant, upsert a calibration,
        decide a proposal, delete, restore, or duplicate — rather than one
        REST endpoint per command type. Every command that targets an
        existing object carries its own expected revision in its payload
        (not an `If-Match` header), because some commands, such as joining
        two lines, target more than one object at once and need more than
        one expected revision.

        `actorProfileId` and `actorType` are never read from the request
        body; the server fills them from the authenticated caller, the same
        rule every other mutation in this API follows.

        Source: implementation-plan.md work package P3-BE-01;
        architecture/map-rendering-and-editing.md, section
        "7. Editor Command Model".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapCommandRequest'
      responses:
        '200':
          description: The object or objects the command affected, at their new revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapCommandResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: addPlant
      tags: [Plants]
      summary: Add a plant
      description: |
        Adds a plant instance, row, or group to the garden's inventory.
        `taxonomyReferenceId` may be set directly here when the caller already
        knows the species; otherwise leave it unset and identify the plant
        later via a photo or `SearchTaxonomyReferences`.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlantRequest'
      responses:
        '201':
          description: The created plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    get:
      operationId: searchPlants
      tags: [Plants]
      summary: Search a garden's plants
      description: |
        Trigram-fuzzy match against `displayName` when `query` is given,
        combined with optional structured filters (`lifecycleStage`,
        `status`, `groupingKind`, each combinable and each accepting more
        than one value), cursor-paginated the same way `ListGardens`
        paginates. Ranked most-similar first when `query` is given, most
        recently created first otherwise.

        Closes a real, already-documented gap: before P4-SEARCH-01 this tag
        had no list operation at all, only single-plant `GetPlant` — the web
        and iOS Phase 4 clients each had to fall back to a
        create-then-navigate / open-by-id flow instead of a real inventory
        list.

        Source: implementation-plan.md work package P4-SEARCH-01.
      parameters:
        - name: query
          in: query
          required: false
          description: Trigram-fuzzy match against displayName. Omit to list every plant matching the other filters.
          schema:
            type: string
            maxLength: 200
        - name: lifecycleStage
          in: query
          required: false
          description: Comma-separated lifecycle stages to include. Omit to include every stage.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PlantLifecycleStage'
        - name: status
          in: query
          required: false
          description: Comma-separated statuses to include. Omit to include every status.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PlantStatus'
        - name: groupingKind
          in: query
          required: false
          description: Comma-separated grouping kinds to include. Omit to include every kind.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PlantGroupingKind'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Matching plants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlantListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /gardens/{gardenId}/plants/from-photo:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: addPlantFromPhoto
      tags: [Plants]
      summary: Add a plant identified from a photo
      description: |
        Creates an `'individual'` plant prefilled from a photo-identification
        pass, and inserts the photo and the identification suggestion in the
        same transaction. `taxonomyReferenceId` on the created plant stays
        unset until the suggestion is confirmed via `ConfirmPlantIdentification`
        — identification never auto-confirms.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlantFromPhotoRequest'
      responses:
        '201':
          description: The created plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getPlant
      tags: [Plants]
      summary: Get a plant
      description: |
        Returns a plant in a garden the caller has active membership in.
        Existence — including a plant id that belongs to a different garden
        than the one named in the path — is concealed as `404`.

        Source: implementation-plan.md work package P4-CONTRACT-01.
      responses:
        '200':
          description: The requested plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updatePlantDetails
      tags: [Plants]
      summary: Update plant details
      description: |
        Revision-guarded edit of identity, acquisition, and care-note fields.
        Every property is optional; an omitted property leaves the current
        value unchanged, while an explicit `null` on a nullable property
        clears it. `groupingKind` is immutable and not editable here.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlantDetailsRequest'
      responses:
        '200':
          description: The updated plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants/{plantId}/photos:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: attachPlantPhoto
      tags: [Plants]
      summary: Attach a photo to a plant
      description: |
        Appends a photo. Never changes the plant's own revision — a photo is
        a child record, not a field of the plant itself — so this command
        carries no `If-Match` precondition.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachPlantPhotoRequest'
      responses:
        '201':
          description: The attached photo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlantPhoto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}/photos/{plantPhotoId}/primary:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantPhotoId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: setPrimaryPlantPhoto
      tags: [Plants]
      summary: Set a plant's primary photo
      description: |
        Clears any existing primary photo for this plant, then marks this one
        primary, in the same transaction. Does not change the plant's own
        revision, so this command carries no `If-Match` precondition, the
        same as `AttachPlantPhoto`.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: The now-primary photo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlantPhoto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}/identification/{identificationId}/confirm:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: identificationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: confirmPlantIdentification
      tags: [Plants]
      summary: Confirm a photo-identification suggestion
      description: |
        Accepts a prior `plant_identification` suggestion, setting the
        plant's `taxonomyReferenceId` and `acceptedIdentificationId`. The
        named identification must belong to the named plant, or the request
        is rejected.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
