  /gardens/{gardenId}/media:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: registerMediaUpload
      tags: [Media]
      summary: Register a media upload and open its upload session
      description: |
        Combines architecture/media-storage-and-processing.md section 7
        ("Upload Flow") steps 2 and 3 in one call: authorizes garden access,
        reserves quota, creates the media record (`registered`), then
        immediately creates a backend-authorized resumable Cloud Storage
        upload session and advances the record to `authorized`. These two
        steps are not split across two endpoints and not left for the client
        to sequence itself — an `authorized` record with no session, or a
        session with no record, is not a usable intermediate state for any
        caller, matching this codebase's "one command, one clear side
        effect" convention applied to the one side effect a caller actually
        needs from registration: an upload it can start.

        The client then uploads directly to `uploadUrl` — never through this
        API (section 2, "Binary media bypasses the interactive API data
        path") — and calls `CompleteMediaUpload` once finished.

        Garden-scoped only this stage: a media row's `gardenId` is nullable
        at the domain layer for a future pre-garden registration case (plan
        import onboarding, P6-PLAN-01), but that endpoint shape does not
        exist yet, so every registration through this contract names its
        garden in the path.

        Source: implementation-plan.md work package P6-API-01;
        architecture/media-storage-and-processing.md, section "7. Upload Flow".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterMediaUploadRequest'
      responses:
        '201':
          description: The registered, upload-authorized media record and its upload session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/media/{mediaId}:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: mediaId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getMediaStatus
      tags: [Media]
      summary: Read a media record's current status
      description: |
        Any garden role that can view the garden can read a media record's
        status — the section 12 viewer restriction applies to download
        access (`GetMediaAccess`), not to reading state.

        Source: implementation-plan.md work package P6-API-01.
      responses:
        '200':
          description: The media record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /gardens/{gardenId}/media/{mediaId}/complete:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: mediaId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: completeMediaUpload
      tags: [Media]
      summary: Verify a finished upload and resolve it to available or rejected
      description: |
        Explicit, client-triggered completion verification only — there is
        no event-driven or Pub/Sub-triggered path yet (that is
        P6-ASYNC-01's own scope). Drives the record through
        `uploading` -> `verifying` and then to a terminal outcome: reads
        real object metadata from Cloud Storage and compares it against the
        declared content type and byte size (section 8/20, "Declared versus
        actual type and size mismatch"). A mismatch, or a missing object,
        resolves to `rejected`; an exact match resolves to `available`. Both
        outcomes are a successful `200` response — verification concluding
        with a rejection is not a request failure.

        Full content-hash (SHA-256) verification against the object's real
        bytes is not performed here: that requires downloading and hashing
        the object, which this synchronous interactive endpoint does not do
        (section 2) — it remains P6-WORKER-01's job. When the client
        declared a checksum at registration, that declared value is carried
        through unchanged on success, never independently confirmed at this
        stage.

        Idempotent under a duplicate completion notification: calling this
        again against an already-`available` or already-`rejected` record
        simply returns the record's current state rather than re-verifying
        or erroring.

        Source: implementation-plan.md work package P6-API-01;
        architecture/media-storage-and-processing.md, sections "7. Upload
        Flow", "8. File Validation", "20. Testing".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The resolved media record (`available` or `rejected`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/media/{mediaId}/access:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: mediaId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getMediaAccess
      tags: [Media]
      summary: Get short-lived authorized download access to a media object
      description: |
        Implements section 12's download flow: authenticates, authorizes
        garden role, and returns a short-lived signed download mechanism —
        never a permanent URL. Only `available` media can be accessed.

        Enforces section 12's own stricter line for the operational viewer
        role: a viewer may access ordinary accepted photos according to
        garden capability, but not `restricted`-classified media (raw scan
        artifacts) unless explicitly allowed. No "explicitly allowed"
        override mechanism exists anywhere in this codebase's role model yet,
        so this is currently an unconditional denial for viewers against
        `restricted` media, not a configurable one.

        The client-portal-specific rules section 12's last paragraph
        describes (organization/client-engagement/publication entitlement)
        are out of scope: those concepts do not exist anywhere in this
        codebase yet (Phase 9, not started), the same deferral Phase 5
        already applied to the identical gap.

        Source: implementation-plan.md work package P6-API-01;
        architecture/media-storage-and-processing.md, section "12. Download Flow".
      responses:
        '200':
          description: Short-lived signed download access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /sync/clients/{clientInstallationId}:
    parameters:
      - name: clientInstallationId
        in: path
        required: true
        description: Client-generated UUIDv7. Stable for the lifetime of one app installation on one device.
        schema:
          $ref: '#/components/schemas/Uuid'

    put:
      operationId: registerSyncClient
      tags: [Synchronization]
      summary: Register or refresh client installation metadata
      description: |
        Registers a new client installation, or refreshes an already-registered
        one under the same `clientInstallationId` — the "register or refresh"
        step named first in the initial-synchronization sequence. `PUT` at a
        client-known id, not `POST`, because the id is minted by the client
        itself before the first call, not assigned by the server: a second
        call with the same id and current metadata is an ordinary idempotent
        refresh, not an ambiguous re-create.

        `protocolVersion` is the sync protocol version this installation
        currently speaks. A version below the server's supported window is
        rejected with `409` and `error.code`
        `sync.protocol_version.unsupported`, the same code and meaning
        `PushSyncOperations` and `GetSyncChanges` use — registration is the
        earliest point a badly outdated client can learn it must upgrade,
        before it ever attempts a push. The rejection never deletes anything
        client-side; the local outbox is untouched.

        Revocation of a client installation (architecture/offline-synchronization.md,
        section "22. Security": "Device installation identifiers are
        application-scoped and revocable") is a support/administrative
        capability with no endpoint in this contract yet — out of scope for
        this work package.

        Source: architecture/offline-synchronization.md, section
        "12. Initial Synchronization", step 1; section "21. Protocol
        Versioning"; section "22. Security".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncClientRegistrationRequest'
      responses:
        '200':
          description: The refreshed client installation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncClientInstallation'
        '201':
          description: The newly registered client installation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncClientInstallation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: |
            `error.code` `sync.protocol_version.unsupported`: `protocolVersion`
            is outside the server's currently supported window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sync/push:
    post:
      operationId: pushSyncOperations
      tags: [Synchronization]
      summary: Push a bounded batch of client outbox operations
      description: |
        Accepts an ordered batch of client-generated domain commands and
        processes each in dependency-aware order. A batch that is
        structurally valid and correctly authenticated always returns `200`
        with one result per operation — an individual operation conflicting,
        being rejected, or being blocked never fails the whole batch, so
        that independent operations in the same batch can still succeed.
        Only a request-level problem (malformed batch, unsupported protocol
        version, oversized batch) fails before any operation is processed.

        Unlike every other mutation endpoint in this API, this operation
        does **not** take the shared `Idempotency-Key` header. Per
        architecture/offline-synchronization.md, section "9. Server
        Idempotency" ("Operation ID is the idempotency key for
        synchronization commands"), each operation's own client-generated
        `operationId` already is the idempotency key, scoped to that one
        operation rather than the whole batch — a batch retried with a
        different mix of operations (for example, with already-accepted
        operations dropped) is still meaningful, which a single request-level
        key would not allow for.

        Every command payload names its own `expectedRevision` where a
        revision precondition applies, the same convention
        `SubmitMapCommand` already established (not a request-level
        `If-Match`), because some commands target more than one record at
        once and need more than one expected revision.

        `actorProfileId` is never read from any operation payload; the
        server fills it from the authenticated caller for every operation,
        the same rule every other mutation in this API follows. For the same
        reason, an outbox operation's local-only bookkeeping fields — retry
        state and last error category (architecture/offline-synchronization.md,
        section "7. Outbox Operation") — never travel on the wire; they
        describe the client's own retry history, not something the server
        needs to receive.

        Source: architecture/offline-synchronization.md, sections
        "7. Outbox Operation", "8. Push Protocol", "9. Server Idempotency";
        architecture/api-design.md, section "16. Synchronization Endpoints".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '200':
          description: One result per submitted operation, in request order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPushResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: |
            `error.code` `sync.protocol_version.unsupported`: `protocolVersion`
            is outside the server's currently supported window. The client's
            local outbox is not implied lost by this response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: '`operations` exceeds the maximum batch size.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /sync/changes:
    get:
      operationId: getSyncChanges
      tags: [Synchronization]
      summary: Pull the server change log since a cursor
      description: |
        Returns changes in deterministic, ordered, bounded, resumable pages.
        `nextCursor` is always present, unlike this API's ordinary list
        endpoints (`ListGardens`, `SearchPlants`), whose `nextCursor` is
        absent once the caller reaches the end: an ordinary list is re-listed
        from the start on the next visit, but a sync cursor is a durable
        position a client resumes from indefinitely, including across an
        empty page, so it always needs a valid position to resume from next
        time, even when caught up.

        Authorization is applied per architecture/offline-synchronization.md,
        section "11. Authorization Changes": a garden the caller has lost
        access to surfaces as an ordinary `record: 'garden'`,
        `operation: 'delete'` change (a tombstone for the whole garden
        partition), not a distinct change shape.

        Source: architecture/offline-synchronization.md, section
        "10. Pull Protocol"; architecture/api-design.md, section
        "16. Synchronization Endpoints".
      parameters:
        - $ref: '#/components/parameters/SyncAfterCursor'
        - $ref: '#/components/parameters/Limit'
        - name: protocolVersion
          in: query
          required: true
          description: The sync protocol version this client currently speaks, checked the same way `PushSyncOperations` checks it.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: A page of changes plus the cursor to resume from.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncChangesResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: |
            One of two stable `error.code` values: `sync.changes.cursor_expired`
            (`after` is older than retained history) or
            `sync.protocol_version.unsupported` (`protocolVersion` is outside
            the server's supported window). Both require a full
            resynchronization per architecture/offline-synchronization.md,
            section "13. Full Resynchronization".
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /sync/acknowledge:
    post:
      operationId: acknowledgeSyncOperations
      tags: [Synchronization]
      summary: Re-learn the durable outcome of already-submitted operations
      description: |
        Resolves a genuine gap in architecture/offline-synchronization.md:
        `POST /v1/sync/acknowledge` is named once, in
        architecture/api-design.md section "16. Synchronization Endpoints",
        with no request or response shape and no explanation of what it
        acknowledges, given that push already returns synchronous
        per-operation results (section "8. Push Protocol") and pull's cursor
        advancement is purely client-local with no server round trip
        (section "10. Pull Protocol").

        This endpoint is resolved as a **cheaper alternative to a full push
        retry**, not a second delivery-confirmation mechanism. Support for
        this reading:

        - Section "9. Server Idempotency": "An unknown client response after
          a network failure is resolved by retrying the same operation ID" —
          this already fully recovers a lost push response; `acknowledge`
          cannot be required for correctness on top of that.
        - Section "24. Testing Matrix" lists "Lost response after accepted
          server commit" as a scenario the protocol must handle — exactly
          the case a full idempotent retry already resolves, but only by
          resending the complete canonical payload for every operation whose
          outcome is merely unknown to the client, which is wasteful for a
          large batch after, for example, a process death between receiving
          and durably persisting the push response.
        - Nothing in the document describes any server-side effect an
          "acknowledgement" would itself cause — pull needs none (client-local
          cursor advance), and push already durably persists its outcome the
          moment it decides it (idempotency record, same transaction).

        So: the client submits operation IDs it believes it already pushed,
        with no payload, and receives back each one's stored durable outcome
        — identical in shape to what `PushSyncOperations` would have
        returned — without re-sending the canonical payload. An operation ID
        with no stored outcome (never actually received, or its idempotency
        record has expired) comes back `unknown`; the client's only recourse
        for that one is a real `PushSyncOperations` retry with its full
        payload.

        Performs no new mutation and takes no `Idempotency-Key` — it only
        reports previously decided outcomes.

        Source: architecture/offline-synchronization.md, sections
        "8. Push Protocol", "9. Server Idempotency", "24. Testing Matrix";
        architecture/api-design.md, section "16. Synchronization Endpoints".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncAcknowledgeRequest'
      responses:
        '200':
          description: One result per requested operation ID, in request order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAcknowledgeResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    firebaseIdToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Firebase ID token presented by the native client.

        Source: architecture/identity-and-authorization.md, section
        "4. Native Authentication Flow".
    sessionCookie:
      type: apiKey
      in: cookie
      name: __session
      description: |
        HTTP-only Firebase session cookie used by the web client. Cookie
        authenticated mutations additionally require CSRF protection.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow".

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated UUIDv7. The same key with a semantically identical
        request returns the original result. The same key with a different
        command is rejected with `request.idempotency.key_reused`.
      schema:
        $ref: '#/components/schemas/Uuid'

    IfMatch:
      name: If-Match
      in: header
      required: true
      description: |
        Expected revision of the target resource, quoted. A stale value is
        rejected rather than silently overwriting a newer state.
      schema:
        type: string
        examples: ['"7"']

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque continuation token from a previous page. Clients must not parse it.
      schema:
        type: string
        maxLength: 512

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    SyncAfterCursor:
      name: after
      in: query
      required: false
      description: |
        Opaque continuation token from a previous `GetSyncChanges` page.
        Omit only for a first-ever pull. Clients must not parse it. Named
        `after`, not `cursor`, matching the exact query parameter name
        architecture/api-design.md section "16. Synchronization Endpoints"
        and architecture/offline-synchronization.md section "10. Pull
        Protocol" both specify for this one endpoint.
      schema:
        type: string
        maxLength: 512

  headers:
    ETag:
      description: Current revision of the returned resource, quoted.
      schema:
        type: string
    RetryAfter:
      description: Seconds to wait before retrying.
      schema:
        type: integer
        minimum: 0

  schemas:
    Uuid:
      type: string
      format: uuid
      description: Opaque UUIDv7 identifier. Time ordering is an index property, not an authoritative creation time.
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      examples: ['019827ab-4c1d-7e3f-9a2b-5c6d7e8f9a0b']

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp in UTC.
      examples: ['2026-07-22T09:15:00Z']

    Revision:
      type: integer
      format: int64
      minimum: 1
      description: Monotonically increasing server revision within one object's identity.

    GardenLifecycleState:
      type: string
      enum: [active, archived, deletionRequested]
      description: |
        `deletionRequested` starts the deletion workflow; it is not immediate
        deletion. No `deleted` value exists yet: nothing can reach it before
        the purge workflow that would produce it is built.

        Source: architecture/data-and-geospatial-design.md, section "15. Deletion".

    GardenRole:
      type: string
      enum: [owner, editor, viewer]
      description: |
        The authenticated caller's own role on this garden. Informational for
        client UI only — the server re-evaluates authorization on every
        request and never trusts a client-submitted role.

        Source: architecture/identity-and-authorization.md, section "8. Garden Roles".

    Garden:
      type: object
      additionalProperties: false
      required: [id, name, lifecycleState, callerRole, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          minLength: 1
          maxLength: 120
        lifecycleState:
          $ref: '#/components/schemas/GardenLifecycleState'
        callerRole:
          $ref: '#/components/schemas/GardenRole'
        revision:
          $ref: '#/components/schemas/Revision'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    GardenListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Garden'
        nextCursor:
          type: string
          description: Opaque continuation token. Absent when no further page exists.

    CreateGardenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    RenameGardenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Freshly obtained Firebase ID token, verified server-side before any cookie is issued.

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          description: Stable machine-readable detail code.
        pointer:
          type: string
          description: JSON Pointer to the offending member, where the error is structural.
        parameters:
          type: object
          additionalProperties: true
          description: Values interpolated into the localized message. Never free-form prose.

    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, correlationId, retryable]
          properties:
            code:
              type: string
              description: |
                Stable dotted code. Clients localize known errors by this value
                rather than by displaying `message`.
              examples: ['garden.geometry.stale_revision']
            message:
              type: string
              description: Safe fallback text in English. Not a localization source.
            correlationId:
              type: string
              description: Identifier for correlating this response with server telemetry.
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
            retryable:
              type: boolean
              description: Whether repeating the identical request may succeed later.

    LivenessResult:
      type: object
      additionalProperties: false
      required: [status, version]
      properties:
        status:
          type: string
          enum: [alive]
        version:
          type: string
          description: Build version of the running artifact.

    DependencyStatus:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
          examples: ['database']
        status:
          type: string
          enum: [available, unavailable]
        detail:
          type: string
          description: Non-sensitive summary. Never contains connection strings or credentials.

    ReadinessResult:
      type: object
      additionalProperties: false
      required: [status, version, dependencies]
      properties:
        status:
          type: string
          enum: [ready, notReady]
        version:
          type: string
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'

    CoordinateSpaceKind:
      type: string
      enum: [localPlanarMetres, geographicWgs84]
      description: |
        Which space a geometry's coordinates belong to. Local planar coordinates
        are metres from a garden-specific origin and are never EPSG:4326.

        Source: ADR-0010.

    Position:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: number
      description: |
        Coordinate pair. In local planar space this is metres east and metres
        north of the garden origin, rounded to 1 mm.

    Geometry:
      oneOf:
        - $ref: '#/components/schemas/PointGeometry'
        - $ref: '#/components/schemas/LineStringGeometry'
        - $ref: '#/components/schemas/PolygonGeometry'
        - $ref: '#/components/schemas/MultiLineStringGeometry'
        - $ref: '#/components/schemas/MultiPolygonGeometry'
      discriminator:
        propertyName: type
        # Without explicit mapping, openapi-typescript sets each branch's
        # discriminator literal to the referenced schema's *name*
        # ("PointGeometry") instead of the actual wire value ("Point"),
        # making the generated type unusable for narrowing real JSON.
        # Confirmed directly: this surfaced building the map module's
        # generated-client consumers.
        mapping:
          Point: '#/components/schemas/PointGeometry'
          LineString: '#/components/schemas/LineStringGeometry'
          Polygon: '#/components/schemas/PolygonGeometry'
          MultiLineString: '#/components/schemas/MultiLineStringGeometry'
          MultiPolygon: '#/components/schemas/MultiPolygonGeometry'

    PointGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          $ref: '#/components/schemas/Position'

    LineStringGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [LineString]
        coordinates:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Position'

    PolygonGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          minItems: 1
          description: First ring is the exterior ring; any further rings are holes.
          items:
            type: array
            minItems: 4
            items:
              $ref: '#/components/schemas/Position'

    MultiLineStringGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiLineString]
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 2
            items:
              $ref: '#/components/schemas/Position'

    MultiPolygonGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiPolygon]
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 1
            items:
              type: array
              minItems: 4
              items:
                $ref: '#/components/schemas/Position'

    ProvenanceKind:
      type: string
      enum:
        - manualDrawing
        - userMeasurement
        - importedPlan
        - importedMapImagery
        - arMeasurement
        - imageExtraction
        - depthCapture
        - externalProvider
        - processor
      description: |
        How a piece of geometry came to exist. Generated results additionally
        reference processor and model versions elsewhere in the record.

        Source: architecture/data-and-geospatial-design.md, section "12. Provenance".

    CurveMetadata:
      type: object
      additionalProperties: false
      required: [kind, controlPoints, chordDeviationMetres]
      description: |
        Advisory. Consumers that ignore this still receive correct geometry from
        the densified `geometry` member.
      properties:
        kind:
          type: string
          enum: [cubicBezier]
        controlPoints:
          type: array
          minItems: 4
          items:
            $ref: '#/components/schemas/Position'
        chordDeviationMetres:
          type: number
          exclusiveMinimum: 0

    GeometryEnvelope:
      type: object
      additionalProperties: false
      required: [geometry, coordinateSpaceId, coordinateSpaceKind, provenance]
      description: |
        The only form in which geometry crosses this API. A bare GeoJSON object
        is never sufficient, because it cannot state its coordinate space.
      properties:
        geometry:
          $ref: '#/components/schemas/Geometry'
        coordinateSpaceId:
          $ref: '#/components/schemas/Uuid'
        coordinateSpaceKind:
          $ref: '#/components/schemas/CoordinateSpaceKind'
        provenance:
          $ref: '#/components/schemas/ProvenanceKind'
        curve:
          $ref: '#/components/schemas/CurveMetadata'
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Absent means "not expressed", not "certain".

    GardenObjectCategory:
      type: string
      enum:
        - lot
        - structure
        - fence
        - gate
        - path
        - zone
        - bed
        - waterFeature
        - utilityExclusion
        - tree
        - plant
        - annotation
        - importedBackground
      description: |
        Source: architecture/map-rendering-and-editing.md, section
        "4. Canonical Object Categories".

    MeasurementUnit:
      type: string
      enum: [metres, squareMetres, degrees]

    MeasurementAcquisitionMethod:
      type: string
      enum:
        - userEntered
        - derivedFromGeometry
        - arMeasurement
        - imageExtraction
        - depthCapture
        - importedPlan

    Measurement:
      type: object
      additionalProperties: false
      required: [value, unit, acquisitionMethod]
      description: |
        The schema must not imply survey accuracy merely because a value
        uses a precise numeric type — every measurement carries how it was
        acquired.

        Source: architecture/data-and-geospatial-design.md, section
        "11. Measurements and Uncertainty".
      properties:
        value:
          type: number
          description: Canonical SI value in `unit`.
        unit:
          $ref: '#/components/schemas/MeasurementUnit'
        acquisitionMethod:
          $ref: '#/components/schemas/MeasurementAcquisitionMethod'
        originalEntry:
          type: string
          description: As the user typed it, before conversion — for example "40 ft".
        uncertainty:
          type: number
          description: Absolute uncertainty in the same unit as `value`.
        referenceObjectId:
          $ref: '#/components/schemas/Uuid'
        calibrationRevision:
          $ref: '#/components/schemas/Revision'

    StructureDetails:
      type: object
      additionalProperties: false
      required: [category, structureKind]
      properties:
        category:
          type: string
          enum: [structure]
        structureKind:
          type: string
          enum: [house, shed, greenhouse, deck, garage, other]
        heightMetres:
          type: number
          exclusiveMinimum: 0

    FenceDetails:
      type: object
      additionalProperties: false
      required: [category, fenceKind]
      properties:
        category:
          type: string
          enum: [fence]
        fenceKind:
          type: string
          enum: [wood, chainLink, vinyl, metal, hedge, other]
        heightMetres:
          type: number
          exclusiveMinimum: 0

    GateDetails:
      type: object
      additionalProperties: false
      required: [category, fenceObjectId]
      description: A gate is always positioned along exactly one fence.
      properties:
        category:
          type: string
          enum: [gate]
        fenceObjectId:
          $ref: '#/components/schemas/Uuid'
        widthMetres:
          type: number
          exclusiveMinimum: 0

    ZoneDetails:
      type: object
      additionalProperties: false
      required: [category, zoneKind]
      properties:
        category:
          type: string
          enum: [zone]
        zoneKind:
          type: string
          enum: [lawn, garden, mulch, gravel, groundCover, other]

    BedDetails:
      type: object
      additionalProperties: false
      required: [category, bedKind]
      properties:
        category:
          type: string
          enum: [bed]
        bedKind:
          type: string
          enum: [inGround, raised, container]
        soilNotes:
          type: string
          maxLength: 2000

    TreeDetails:
      type: object
      additionalProperties: false
      required: [category]
      description: |
        The canopy is a second, optional geometry — distinct from the trunk
        position carried by the object's own `geometryEnvelope`.
      properties:
        category:
          type: string
          enum: [tree]
        canopyGeometry:
          $ref: '#/components/schemas/Geometry'
        commonName:
          type: string
          maxLength: 200
        estimatedHeightMetres:
          type: number
          exclusiveMinimum: 0
        estimatedSpreadMetres:
          type: number
          exclusiveMinimum: 0

    PlantPlacementDetails:
      type: object
      additionalProperties: false
      required: [category, commonName, quantity]
      description: |
        Deliberately without a plant-catalog reference: the species and care
        catalog is Phase 4 scope.
      properties:
        category:
          type: string
          enum: [plant]
        commonName:
          type: string
          minLength: 1
          maxLength: 200
        quantity:
          type: integer
          minimum: 1
        spacingMetres:
          type: number
          exclusiveMinimum: 0
        assignedToObjectId:
          $ref: '#/components/schemas/Uuid'

    UtilityExclusionDetails:
      type: object
      additionalProperties: false
      required: [category, utilityExclusionKind]
      properties:
        category:
          type: string
          enum: [utilityExclusion]
        utilityExclusionKind:
          type: string
          enum: [undergroundUtility, septicField, wellRadius, setback, other]
        notes:
          type: string
          maxLength: 2000

    AnnotationDetails:
      type: object
      additionalProperties: false
      required: [category]
      description: Where a `Measurement` attaches — the "Annotation and measurement reference" category.
      properties:
        category:
          type: string
          enum: [annotation]
        measurement:
          $ref: '#/components/schemas/Measurement'

    GardenObjectDetails:
      oneOf:
        - $ref: '#/components/schemas/StructureDetails'
        - $ref: '#/components/schemas/FenceDetails'
        - $ref: '#/components/schemas/GateDetails'
        - $ref: '#/components/schemas/ZoneDetails'
        - $ref: '#/components/schemas/BedDetails'
        - $ref: '#/components/schemas/TreeDetails'
        - $ref: '#/components/schemas/PlantPlacementDetails'
        - $ref: '#/components/schemas/UtilityExclusionDetails'
        - $ref: '#/components/schemas/AnnotationDetails'
      discriminator:
        propertyName: category
        # See Geometry's discriminator comment: mapping to the actual wire
        # values, not schema names, is required for the generated type to
        # narrow real JSON correctly.
        mapping:
          structure: '#/components/schemas/StructureDetails'
          fence: '#/components/schemas/FenceDetails'
          gate: '#/components/schemas/GateDetails'
          zone: '#/components/schemas/ZoneDetails'
          bed: '#/components/schemas/BedDetails'
          tree: '#/components/schemas/TreeDetails'
          plant: '#/components/schemas/PlantPlacementDetails'
          utilityExclusion: '#/components/schemas/UtilityExclusionDetails'
          annotation: '#/components/schemas/AnnotationDetails'
      description: |
        Present only for categories that have specialized fields. `lot`,
        `path`, `waterFeature`, and `importedBackground` carry no
        `details` member.

    GardenObjectLifecycleState:
      type: string
      enum: [active, deleted]

    GardenObject:
      type: object
      additionalProperties: false
      required:
        [id, gardenId, category, geometryEnvelope, lifecycleState, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          $ref: '#/components/schemas/Uuid'
        category:
          $ref: '#/components/schemas/GardenObjectCategory'
        geometryEnvelope:
          $ref: '#/components/schemas/GeometryEnvelope'
        label:
          type: string
          maxLength: 200
        details:
          $ref: '#/components/schemas/GardenObjectDetails'
        lifecycleState:
          $ref: '#/components/schemas/GardenObjectLifecycleState'
        revision:
          $ref: '#/components/schemas/Revision'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    ValidationSeverity:
      type: string
      enum: [error, warning]

    ValidationIssue:
      type: object
      additionalProperties: false
      required: [code, severity]
      description: |
        Warnings do not block a save unless the corresponding rule protects
        data integrity or safety.

        Source: architecture/map-rendering-and-editing.md, section
        "11. Validation".
      properties:
        code:
          type: string
          description: Stable machine-readable code, localized client-side.
        severity:
          $ref: '#/components/schemas/ValidationSeverity'
        affectedObjectIds:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        geometry:
          $ref: '#/components/schemas/Geometry'
          description: The offending geometry, when the issue is localizable to a shape rather than a whole object.

    Georeference:
      type: object
      additionalProperties: false
      required:
        [
          localAnchor,
          geographicAnchor,
          rotationDegrees,
          scaleCorrection,
          provenance,
          method,
          revision,
        ]
      properties:
        localAnchor:
          $ref: '#/components/schemas/Position'
        geographicAnchor:
          $ref: '#/components/schemas/Position'
          description: Longitude, latitude — WGS84.
        rotationDegrees:
          type: number
        scaleCorrection:
          type: number
          exclusiveMinimum: 0
        accuracyMetres:
          type: number
          minimum: 0
        provenance:
          $ref: '#/components/schemas/ProvenanceKind'
        method:
          type: string
        revision:
          $ref: '#/components/schemas/Revision'

    GardenMapDocument:
      type: object
      additionalProperties: false
      required: [coordinateSpaceId, objects, validationSummary]
      description: |
        Source: architecture/map-rendering-and-editing.md, section
        "6. Hybrid Data Model".
      properties:
        coordinateSpaceId:
          $ref: '#/components/schemas/Uuid'
        georeference:
          $ref: '#/components/schemas/Georeference'
        objects:
          type: array
          items:
            $ref: '#/components/schemas/GardenObject'
        validationSummary:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    VertexOperation:
      type: string
      enum: [insert, move, remove]

    ProposalDecision:
      type: string
      enum: [accept, modifyAndAccept, reject]

    CreateMapObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, category, geometry]
      properties:
        type:
          type: string
          enum: [createObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        category:
          $ref: '#/components/schemas/GardenObjectCategory'
        geometry:
          $ref: '#/components/schemas/Geometry'
        label:
          type: string
          maxLength: 200
        categoryDetails:
          $ref: '#/components/schemas/GardenObjectDetails'

    MoveObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, translationMetres]
      properties:
        type:
          type: string
          enum: [moveObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        translationMetres:
          type: object
          additionalProperties: false
          required: [dx, dy]
          properties:
            dx:
              type: number
            dy:
              type: number

    ReplaceGeometryCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, geometry]
      description: What a resize, rotate, or freehand reshape gesture commits as.
      properties:
        type:
          type: string
          enum: [replaceGeometry]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        geometry:
          $ref: '#/components/schemas/Geometry'

    EditVertexCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, operation, ringIndex, vertexIndex]
      properties:
        type:
          type: string
          enum: [editVertex]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        operation:
          $ref: '#/components/schemas/VertexOperation'
        ringIndex:
          type: integer
          minimum: 0
        vertexIndex:
          type: integer
          minimum: 0
        position:
          $ref: '#/components/schemas/Position'
          description: Required for `insert` and `move`; absent for `remove`.

    SplitLineworkCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, resultObjectIds, atVertexIndex]
      properties:
        type:
          type: string
          enum: [splitLinework]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        resultObjectIds:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/Uuid'
        atVertexIndex:
          type: integer
          minimum: 0

    JoinLineworkCommand:
      type: object
      additionalProperties: false
      required:
        [
          type,
          firstObjectId,
          firstExpectedRevision,
          secondObjectId,
          secondExpectedRevision,
          resultObjectId,
        ]
      properties:
        type:
          type: string
          enum: [joinLinework]
        firstObjectId:
          $ref: '#/components/schemas/Uuid'
        firstExpectedRevision:
          $ref: '#/components/schemas/Revision'
        secondObjectId:
          $ref: '#/components/schemas/Uuid'
        secondExpectedRevision:
          $ref: '#/components/schemas/Revision'
        resultObjectId:
          $ref: '#/components/schemas/Uuid'

    ChangePropertiesCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision]
      properties:
        type:
          type: string
          enum: [changeProperties]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        label:
          type: string
          maxLength: 200
        categoryDetails:
          $ref: '#/components/schemas/GardenObjectDetails'

    AssignPlantCommand:
      type: object
      additionalProperties: false
      required: [type, plantObjectId, expectedRevision, targetObjectId]
      properties:
        type:
          type: string
          enum: [assignPlant]
        plantObjectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        targetObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
          description: '`null` unassigns the plant from any zone or bed.'

    UpsertCalibrationCommand:
      type: object
      additionalProperties: false
      required: [type, backgroundObjectId, referencePoints]
      properties:
        type:
          type: string
          enum: [upsertCalibration]
        backgroundObjectId:
          $ref: '#/components/schemas/Uuid'
        referencePoints:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [imagePixel, localMetres]
            properties:
              imagePixel:
                $ref: '#/components/schemas/Position'
              localMetres:
                $ref: '#/components/schemas/Position'

    DecideProposalCommand:
      type: object
      additionalProperties: false
      required: [type, proposalId, decision]
      properties:
        type:
          type: string
          enum: [decideProposal]
        proposalId:
          $ref: '#/components/schemas/Uuid'
        decision:
          $ref: '#/components/schemas/ProposalDecision'
        editedGeometry:
          $ref: '#/components/schemas/Geometry'
          description: Required only for `modifyAndAccept`.

    DeleteObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision]
      properties:
        type:
          type: string
          enum: [deleteObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'

    RestoreObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision]
      properties:
        type:
          type: string
          enum: [restoreObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'

    DuplicateObjectCommand:
      type: object
      additionalProperties: false
      required: [type, sourceObjectId, newObjectId, offsetMetres]
      properties:
        type:
          type: string
          enum: [duplicateObject]
        sourceObjectId:
          $ref: '#/components/schemas/Uuid'
        newObjectId:
          $ref: '#/components/schemas/Uuid'
        offsetMetres:
          type: object
          additionalProperties: false
          required: [dx, dy]
          properties:
            dx:
              type: number
            dy:
              type: number

    MapCommandPayload:
      oneOf:
        - $ref: '#/components/schemas/CreateMapObjectCommand'
        - $ref: '#/components/schemas/MoveObjectCommand'
        - $ref: '#/components/schemas/ReplaceGeometryCommand'
        - $ref: '#/components/schemas/EditVertexCommand'
        - $ref: '#/components/schemas/SplitLineworkCommand'
        - $ref: '#/components/schemas/JoinLineworkCommand'
        - $ref: '#/components/schemas/ChangePropertiesCommand'
        - $ref: '#/components/schemas/AssignPlantCommand'
        - $ref: '#/components/schemas/UpsertCalibrationCommand'
        - $ref: '#/components/schemas/DecideProposalCommand'
        - $ref: '#/components/schemas/DeleteObjectCommand'
        - $ref: '#/components/schemas/RestoreObjectCommand'
        - $ref: '#/components/schemas/DuplicateObjectCommand'
      discriminator:
        propertyName: type
        # See Geometry's discriminator comment: mapping to the actual wire
        # values, not schema names, is required for the generated type to
        # narrow real JSON correctly.
        mapping:
          createObject: '#/components/schemas/CreateMapObjectCommand'
          moveObject: '#/components/schemas/MoveObjectCommand'
          replaceGeometry: '#/components/schemas/ReplaceGeometryCommand'
          editVertex: '#/components/schemas/EditVertexCommand'
          splitLinework: '#/components/schemas/SplitLineworkCommand'
          joinLinework: '#/components/schemas/JoinLineworkCommand'
          changeProperties: '#/components/schemas/ChangePropertiesCommand'
          assignPlant: '#/components/schemas/AssignPlantCommand'
          upsertCalibration: '#/components/schemas/UpsertCalibrationCommand'
          decideProposal: '#/components/schemas/DecideProposalCommand'
          deleteObject: '#/components/schemas/DeleteObjectCommand'
          restoreObject: '#/components/schemas/RestoreObjectCommand'
          duplicateObject: '#/components/schemas/DuplicateObjectCommand'

    MapCommandRequest:
      type: object
      additionalProperties: false
      required: [commandId, clientTimestamp, payload]
      properties:
        commandId:
          $ref: '#/components/schemas/Uuid'
        clientTimestamp:
          $ref: '#/components/schemas/Timestamp'
        payload:
          $ref: '#/components/schemas/MapCommandPayload'

    MapCommandResult:
      type: object
      additionalProperties: false
      required: [affectedObjects]
      properties:
        affectedObjects:
          type: array
          items:
            $ref: '#/components/schemas/GardenObject'

    PlantGroupingKind:
      type: string
      enum: [individual, row, group]
      description: Whether `Plant` tracks a single instance, a row, or a group as one record.

    PlantAcquisitionDateType:
      type: string
      enum: [planted, sown, acquired]

    PlantLifecycleStage:
      type: string
      enum:
        - planned
        - seed
        - seedling
        - transplanted
        - growing
        - flowering
        - fruiting
        - ready_to_harvest
      description: |
        No ordering is enforced: any stage is reachable from any other, and
        transitioning to the stage already held is accepted as a legitimate,
        if inert, command.

    PlantStatus:
      type: string
      enum: [active, dormant, archived, removed, dead]
      description: |
        The axis orthogonal to `PlantLifecycleStage`. There is no hard-delete
        command for a plant — removing one from active inventory is a
        transition to `removed` or `dead` here.

    TaxonomySource:
      type: string
      enum: [system_catalog, user_defined]
      description: Whether a taxonomy reference was seeded independently of any profile, or defined by one.

    Plant:
      type: object
      additionalProperties: false
      required:
        [
          id,
          gardenId,
          gardenAreaMapObjectId,
          placementMapObjectId,
          displayName,
          taxonomyReferenceId,
          varietyLabel,
          acceptedIdentificationId,
          acquisitionDate,
          acquisitionDateType,
          groupingKind,
          quantity,
          lifecycleStage,
          status,
          conditionNote,
          careGuidanceNote,
          revision,
          createdByProfileId,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          $ref: '#/components/schemas/Uuid'
        gardenAreaMapObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        placementMapObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        taxonomyReferenceId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        varietyLabel:
          type: [string, 'null']
        acceptedIdentificationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        acquisitionDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        acquisitionDateType:
          oneOf:
            - $ref: '#/components/schemas/PlantAcquisitionDateType'
            - type: 'null'
        groupingKind:
          $ref: '#/components/schemas/PlantGroupingKind'
        quantity:
          oneOf:
            - type: integer
              minimum: 1
            - type: 'null'
        lifecycleStage:
          $ref: '#/components/schemas/PlantLifecycleStage'
        status:
          $ref: '#/components/schemas/PlantStatus'
        conditionNote:
          type: [string, 'null']
        careGuidanceNote:
          type: [string, 'null']
        revision:
          $ref: '#/components/schemas/Revision'
        createdByProfileId:
          $ref: '#/components/schemas/Uuid'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    PlantListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Plant'
        nextCursor:
          type: string
          description: Opaque continuation token. Absent when no further page exists.

    PlantPhoto:
      type: object
      additionalProperties: false
      required: [id, plantId, mediaId, isPrimary, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        plantId:
          $ref: '#/components/schemas/Uuid'
        mediaId:
          $ref: '#/components/schemas/Uuid'
        isPrimary:
          type: boolean
        createdAt:
          $ref: '#/components/schemas/Timestamp'

    TaxonomyReference:
      type: object
      additionalProperties: false
      required: [id, scientificName, commonName, varietyName, source, createdByProfileId, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
