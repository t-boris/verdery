    # ------------------------------------------------------------------
    # Media (P6-API-01).
    #
    # Registration, authorized resumable upload sessions, client-triggered
    # completion verification, status, and short-lived authorized access.
    # `bucketName`/`objectKey` are deliberately never exposed on `Media`:
    # section 2, "Cloud Storage object names are opaque infrastructure
    # identifiers," and section 5, "Signed URLs and resumable session URLs
    # are not persisted as identity" — a client's only ways to reach the
    # underlying object are `uploadUrl` (from `MediaUploadSession`, at
    # registration) and the signed `url` (from `MediaAccess`, at download
    # time), never a bucket/key pair it could construct its own URL from.
    #
    # Source: architecture/media-storage-and-processing.md.
    # ------------------------------------------------------------------

    MediaClass:
      type: string
      enum:
        [
          garden_photo,
          imported_plan,
          raw_capture,
          derived_preview,
          processing_output,
          export_package,
        ]
      description: |
        Matches section 3's class table exactly. No separate "purpose" field
        exists: see `media.media_record.media_class`'s own migration comment
        for why "purpose" resolves to this field alone.

    MediaUploadState:
      type: string
      enum:
        [
          registered,
          authorized,
          uploading,
          verifying,
          rejected,
          available,
          deletion_scheduled,
          deleted,
        ]
      description: |
        Section 6's upload state machine, one column, server-owned and
        revisioned. `uploading` and `verifying` are transient from this
        contract's own point of view: `CompleteMediaUpload` drives a record
        through both in one call, so neither state is normally observed by a
        `GetMediaStatus` read between them.

    MediaProcessingState:
      type: string
      enum: [processing, processed, processing_failed]
      description: |
        Orthogonal to `uploadState` — see `domain/media-lifecycle.ts`'s own
        header comment for why this is a second, independent column rather
        than a continuation of the same state machine. `null` means
        processing has not started (or does not apply to this media class).
        No P6-API-01 endpoint transitions this column; it is surfaced here
        read-only, populated once P6-WORKER-02 exists.

    MediaSensitivityClassification:
      type: string
      enum: [standard, sensitive, restricted]
      description: |
        Derived from `mediaClass` at registration, never client-supplied.
        `restricted` (raw capture) is the classification `GetMediaAccess`
        denies to the operational viewer role per section 12.

    Media:
      type: object
      additionalProperties: false
      required:
        [
          id,
          gardenId,
          uploadedByProfileId,
          mediaClass,
          displayFilename,
          declaredContentType,
          verifiedContentType,
          declaredByteSize,
          verifiedByteSize,
          checksumSha256,
          uploadState,
          processingState,
          sensitivityClassification,
          revision,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          allOf:
            - $ref: '#/components/schemas/Uuid'
          description: |
            The domain record's own `gardenId` is nullable (a pre-garden
            registration case P6-PLAN-01 will use), but every endpoint this
            contract exposes is garden-scoped, so every `Media` reachable
            through it always has one.
        uploadedByProfileId:
          $ref: '#/components/schemas/Uuid'
        mediaClass:
          $ref: '#/components/schemas/MediaClass'
        displayFilename:
          type: string
          minLength: 1
          maxLength: 255
        declaredContentType:
          type: string
          minLength: 1
        verifiedContentType:
          type: [string, 'null']
          description: Set once `CompleteMediaUpload` reads real object metadata. `null` until then.
        declaredByteSize:
          type: integer
          minimum: 1
        verifiedByteSize:
          type: [integer, 'null']
          minimum: 1
          description: Set once `CompleteMediaUpload` reads real object metadata. `null` until then.
        checksumSha256:
          type: [string, 'null']
          pattern: '^[0-9a-f]{64}$'
          description: |
            The client's own declared checksum, when supplied at
            registration; `null` otherwise. Never independently confirmed
            against the object's real bytes by this stage — see
            `CompleteMediaUpload`'s own description.
        uploadState:
          $ref: '#/components/schemas/MediaUploadState'
        processingState:
          oneOf:
            - $ref: '#/components/schemas/MediaProcessingState'
            - type: 'null'
        sensitivityClassification:
          $ref: '#/components/schemas/MediaSensitivityClassification'
        revision:
          $ref: '#/components/schemas/Revision'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    RegisterMediaUploadRequest:
      type: object
      additionalProperties: false
      required: [mediaClass, displayFilename, declaredContentType, declaredByteSize]
      properties:
        mediaClass:
          $ref: '#/components/schemas/MediaClass'
        displayFilename:
          type: string
          minLength: 1
          maxLength: 255
        declaredContentType:
          type: string
          minLength: 1
        declaredByteSize:
          type: integer
          minimum: 1
        checksumSha256:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: Supplied "when available" (section 7, step 1). Omit when not yet computed.

    MediaUploadSession:
      type: object
      additionalProperties: false
      required: [media, uploadUrl, uploadUrlExpiresAt]
      description: |
        `RegisterMediaUpload`'s response: the newly `authorized` media record
        plus the backend-authorized resumable upload session the client
        uploads directly to.
      properties:
        media:
          $ref: '#/components/schemas/Media'
        uploadUrl:
          type: string
          format: uri
          description: Resumable upload session URI. The client issues its own PUT requests here directly — never through this API.
        uploadUrlExpiresAt:
          $ref: '#/components/schemas/Timestamp'

    MediaAccess:
      type: object
      additionalProperties: false
      required: [url, expiresAt]
      description: "`GetMediaAccess`'s response: a short-lived signed download URL. Never a permanent one."
      properties:
        url:
          type: string
          format: uri
        expiresAt:
          $ref: '#/components/schemas/Timestamp'

    # ------------------------------------------------------------------
    # Synchronization (P5-API-01).
    #
    # Wire shapes for the native offline outbox protocol: client
    # installation registration, batched push, resumable pull of the
    # server change log, and cheap re-acknowledgement of already-pushed
    # operations. Source: architecture/offline-synchronization.md;
    # architecture/api-design.md, section "16. Synchronization Endpoints".
    # ------------------------------------------------------------------

    SyncRecordType:
      type: string
      enum: [garden, gardenObject, calibration, plant, observation, task]
      description: |
        Every record type this service's sync change log writes today.
        Matches `SyncRecordType` in
        services/api/src/platform/sync/sync-record-type.ts exactly — grow
        that union first when a module starts writing a new type, then add
        the matching value here.

        `calibration` has no direct branch in `SyncOperationPayload` below:
        a calibration is written only as a side effect of `map.upsertCalibration`,
        submitted the same way every other map command is, under
        `recordType: 'gardenObject'`.

    SyncRecordReference:
      type: object
      additionalProperties: false
      required: [recordId, recordType, revision]
      description: |
        The minimum a client needs to know a record changed and at what
        revision, without the full record body — what an `accepted` or
        `duplicate` push result carries.
      properties:
        recordId:
          $ref: '#/components/schemas/Uuid'
        recordType:
          $ref: '#/components/schemas/SyncRecordType'
        revision:
          $ref: '#/components/schemas/Revision'

    Calibration:
      type: object
      additionalProperties: false
      required: [id, backgroundObjectId, revision, referencePoints, createdByProfileId, createdAt]
      description: |
        A background-image calibration revision. Recalibration always
        inserts a new row rather than updating one in place, so `revision`
        identifies this specific calibration attempt, not a mutable
        object's current state — mirrors `Calibration` in
        gardens-mapping/application/calibration-repository.ts. Not exposed
        by `SubmitMapCommand`'s own response today; introduced here because
        `GetSyncChanges` needs a real payload for `recordType: 'calibration'`
        upserts, per architecture/offline-synchronization.md's own
        requirement that a change "contains enough information to upsert...
        a local read-model record."
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        backgroundObjectId:
          $ref: '#/components/schemas/Uuid'
        revision:
          $ref: '#/components/schemas/Revision'
        referencePoints:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [imagePixel, localMetres]
            properties:
              imagePixel:
                $ref: '#/components/schemas/Position'
              localMetres:
                $ref: '#/components/schemas/Position'
        residualErrorMetres:
          type: [number, 'null']
        createdByProfileId:
          $ref: '#/components/schemas/Uuid'
        createdAt:
          $ref: '#/components/schemas/Timestamp'

    SyncGardenSnapshot:
      type: object
      additionalProperties: false
      required: [recordType, data]
      properties:
        recordType:
          type: string
          enum: [garden]
        data:
          $ref: '#/components/schemas/Garden'

    SyncGardenObjectSnapshot:
      type: object
      additionalProperties: false
      required: [recordType, data]
      properties:
        recordType:
          type: string
          enum: [gardenObject]
        data:
          $ref: '#/components/schemas/GardenObject'

    SyncCalibrationSnapshot:
      type: object
      additionalProperties: false
      required: [recordType, data]
      properties:
        recordType:
          type: string
          enum: [calibration]
        data:
          $ref: '#/components/schemas/Calibration'

    SyncPlantSnapshot:
      type: object
      additionalProperties: false
      required: [recordType, data]
      properties:
        recordType:
          type: string
          enum: [plant]
        data:
          $ref: '#/components/schemas/Plant'

    SyncObservationSnapshot:
      type: object
      additionalProperties: false
      required: [recordType, data]
      properties:
        recordType:
          type: string
          enum: [observation]
        data:
          $ref: '#/components/schemas/Observation'

    SyncTaskSnapshot:
      type: object
      additionalProperties: false
      required: [recordType, data]
      properties:
        recordType:
          type: string
          enum: [task]
        data:
          $ref: '#/components/schemas/Task'

    SyncRecordSnapshot:
      oneOf:
        - $ref: '#/components/schemas/SyncGardenSnapshot'
        - $ref: '#/components/schemas/SyncGardenObjectSnapshot'
        - $ref: '#/components/schemas/SyncCalibrationSnapshot'
        - $ref: '#/components/schemas/SyncPlantSnapshot'
        - $ref: '#/components/schemas/SyncObservationSnapshot'
        - $ref: '#/components/schemas/SyncTaskSnapshot'
      discriminator:
        propertyName: recordType
        # See Geometry's discriminator comment (above, in the Map section)
        # for why `mapping` to the actual wire values is required for
        # openapi-typescript to narrow real JSON by `recordType`.
        mapping:
          garden: '#/components/schemas/SyncGardenSnapshot'
          gardenObject: '#/components/schemas/SyncGardenObjectSnapshot'
          calibration: '#/components/schemas/SyncCalibrationSnapshot'
          plant: '#/components/schemas/SyncPlantSnapshot'
          observation: '#/components/schemas/SyncObservationSnapshot'
          task: '#/components/schemas/SyncTaskSnapshot'
      description: The full current representation of one record, used both for `GetSyncChanges` upserts and for a push `conflict` result's current server state.

    SyncChange:
      type: object
      additionalProperties: false
      required: [sequence, gardenId, recordId, recordType, operation, recordRevision, committedAt]
      description: |
        One row of `platform.sync_change`. `record` is present when
        `operation` is `'upsert'` and absent when `operation` is `'delete'`
        — a tombstone's identity, type, garden, revision, and sequence are
        already the sibling fields above; no further payload is needed to
        apply it, per architecture/offline-synchronization.md, section
        "17. Deletion and Tombstones".

        Source: services/api/src/platform/sync/sync-change-recorder.ts;
        services/api/src/platform/database/platform-schema.ts (`SyncChangeRow`).
      properties:
        sequence:
          type: integer
          format: int64
          description: Strictly increasing within a garden partition. The pull cursor's ordering key.
        gardenId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
          description: '`null` only for a record with no owning garden; every change this service produces today always has one.'
        recordId:
          $ref: '#/components/schemas/Uuid'
        recordType:
          $ref: '#/components/schemas/SyncRecordType'
        operation:
          type: string
          enum: [upsert, delete]
        recordRevision:
          $ref: '#/components/schemas/Revision'
        committedAt:
          $ref: '#/components/schemas/Timestamp'
        record:
          $ref: '#/components/schemas/SyncRecordSnapshot'

    SyncChangesResult:
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      description: |
        Unlike `GardenListResult`/`PlantListResult`, `nextCursor` is always
        present, including on an empty or final page — see `GetSyncChanges`'s
        own description for why a durable sync cursor cannot use this
        contract's ordinary "absent once caught up" list convention.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SyncChange'
        nextCursor:
          type: string
          description: Opaque continuation token for the next `GetSyncChanges` call. Clients must not parse it.

    SyncCreateGardenCommand:
      type: object
      additionalProperties: false
      required: [commandType, request]
      description: The new garden's id is `SyncGardenOperationPayload.gardenId`, not a field here — client-generated, the same way `CreateMapObjectCommand.objectId` is.
      properties:
        commandType:
