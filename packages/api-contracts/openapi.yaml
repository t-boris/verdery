openapi: 3.1.0

info:
  title: Verdery API
  version: 1.0.0
  summary: Garden mapping, care records, and recommendations
  description: |
    The external contract shared by the native Apple and web applications.

    This document is the machine-readable source of truth for paths, schemas,
    error envelopes, pagination, idempotency, and concurrency headers. Generated
    clients are wrapped by handwritten application gateways and are never edited
    by hand.

    Conventions:

    - Paths use plural lowercase nouns; JSON fields use `camelCase`.
    - Identifiers are opaque UUIDv7 strings.
    - Timestamps are RFC 3339 in UTC.
    - Measurements are SI with explicit unit metadata where ambiguity exists.
    - Geometry always travels inside an envelope naming its coordinate space,
      because GeoJSON alone cannot say whether coordinates are local metres or
      longitude and latitude.

    Source: architecture/api-design.md.
  license:
    name: UNLICENSED
    identifier: LicenseRef-Proprietary

servers:
  - url: /v1
    description: Version 1

tags:
  - name: Operations
    description: Service health and readiness, used by infrastructure rather than by end users.
  - name: Gardens
    description: Garden lifecycle — list, create, view, rename, archive, and request deletion.
  - name: Authentication
    description: Web session exchange for the browser client. Native clients use a Firebase ID token directly and never call these.

paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Operations]
      summary: Liveness probe
      description: |
        Reports whether the process is running. Never checks dependencies, so a
        degraded database does not cause the platform to restart a healthy
        process.
      security: []
      responses:
        '200':
          description: The process is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResult'
        '500':
          $ref: '#/components/responses/InternalError'

  /health/ready:
    get:
      operationId: getReadiness
      tags: [Operations]
      summary: Readiness probe
      description: |
        Reports whether the service can serve traffic, including its required
        dependencies. Returns `503` when a required dependency is unavailable so
        that the platform stops routing requests to this instance.
      security: []
      responses:
        '200':
          description: The service is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResult'
        '503':
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResult'

  /auth/session:
    post:
      operationId: createSession
      tags: [Authentication]
      summary: Exchange a Firebase ID token for a web session
      description: |
        The browser signs in with a Firebase provider client-side, then
        submits the resulting ID token here. The server verifies it and
        responds with a `Secure`, `HttpOnly` session cookie plus a
        readable CSRF cookie; the ID token itself never becomes a
        persistent browser credential.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow".
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '204':
          description: Session established. Cookies are set on the response.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      operationId: endSession
      tags: [Authentication]
      summary: Log out
      description: |
        Clears the session and CSRF cookies and revokes the underlying
        Firebase refresh tokens. Idempotent: succeeds even when no valid
        session cookie is present, so a client can always clear a broken
        session state.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow", step 6.
      security: []
      responses:
        '204':
          description: Session cleared.
        '403':
          $ref: '#/components/responses/Forbidden'

  /gardens:
    get:
      operationId: listGardens
      tags: [Gardens]
      summary: List the caller's gardens
      description: |
        Returns every garden the authenticated profile has active membership
        in, most recently created first, regardless of lifecycle state.

        Source: implementation-plan.md work package P2-API-01.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The caller's gardens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createGarden
      tags: [Gardens]
      summary: Create a garden
      description: |
        Creates a garden and grants the caller the owner role on it in the
        same transaction. Every garden has exactly one owner at creation.

        Source: implementation-plan.md work package P2-API-01;
        architecture/identity-and-authorization.md, section "8. Garden Roles".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGardenRequest'
      responses:
        '201':
          description: The created garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getGarden
      tags: [Gardens]
      summary: Get a garden
      description: |
        Returns a garden the caller has active membership in. Existence is
        concealed as `404` for a profile with no membership on this garden.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01.
      responses:
        '200':
          description: The requested garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: renameGarden
      tags: [Gardens]
      summary: Rename a garden
      description: |
        Renaming is an owner-only garden setting, distinct from editing garden
        content. Existence is concealed as `404` for a non-member; an editor
        or viewer member instead receives `403`, since they already know the
        garden exists.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01;
        architecture/identity-and-authorization.md, section "8. Garden Roles".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameGardenRequest'
      responses:
        '200':
          description: The renamed garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/archive:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: archiveGarden
      tags: [Gardens]
      summary: Archive a garden
      description: |
        Owner-only lifecycle command. Archiving an already-archived garden
        under a new idempotency key is a domain conflict, not a silent no-op.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The archived garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/delete-request:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: requestGardenDeletion
      tags: [Gardens]
      summary: Request garden deletion
      description: |
        Owner-only lifecycle command. Starts the deletion workflow; it does
        not delete the garden immediately. Purge after the recovery window is
        a separate, not-yet-implemented asynchronous workflow.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01;
        architecture/data-and-geospatial-design.md, section "15. Deletion".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The garden, now in the deletion_requested lifecycle state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

components:
  securitySchemes:
    firebaseIdToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Firebase ID token presented by the native client.

        Source: architecture/identity-and-authorization.md, section
        "4. Native Authentication Flow".
    sessionCookie:
      type: apiKey
      in: cookie
      name: __session
      description: |
        HTTP-only Firebase session cookie used by the web client. Cookie
        authenticated mutations additionally require CSRF protection.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow".

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated UUIDv7. The same key with a semantically identical
        request returns the original result. The same key with a different
        command is rejected with `request.idempotency.key_reused`.
      schema:
        $ref: '#/components/schemas/Uuid'

    IfMatch:
      name: If-Match
      in: header
      required: true
      description: |
        Expected revision of the target resource, quoted. A stale value is
        rejected rather than silently overwriting a newer state.
      schema:
        type: string
        examples: ['"7"']

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque continuation token from a previous page. Clients must not parse it.
      schema:
        type: string
        maxLength: 512

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  headers:
    ETag:
      description: Current revision of the returned resource, quoted.
      schema:
        type: string
    RetryAfter:
      description: Seconds to wait before retrying.
      schema:
        type: integer
        minimum: 0

  schemas:
    Uuid:
      type: string
      format: uuid
      description: Opaque UUIDv7 identifier. Time ordering is an index property, not an authoritative creation time.
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      examples: ['019827ab-4c1d-7e3f-9a2b-5c6d7e8f9a0b']

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp in UTC.
      examples: ['2026-07-22T09:15:00Z']

    Revision:
      type: integer
      format: int64
      minimum: 1
      description: Monotonically increasing server revision within one object's identity.

    GardenLifecycleState:
      type: string
      enum: [active, archived, deletionRequested]
      description: |
        `deletionRequested` starts the deletion workflow; it is not immediate
        deletion. No `deleted` value exists yet: nothing can reach it before
        the purge workflow that would produce it is built.

        Source: architecture/data-and-geospatial-design.md, section "15. Deletion".

    GardenRole:
      type: string
      enum: [owner, editor, viewer]
      description: |
        The authenticated caller's own role on this garden. Informational for
        client UI only — the server re-evaluates authorization on every
        request and never trusts a client-submitted role.

        Source: architecture/identity-and-authorization.md, section "8. Garden Roles".

    Garden:
      type: object
      additionalProperties: false
      required: [id, name, lifecycleState, callerRole, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          minLength: 1
          maxLength: 120
        lifecycleState:
          $ref: '#/components/schemas/GardenLifecycleState'
        callerRole:
          $ref: '#/components/schemas/GardenRole'
        revision:
          $ref: '#/components/schemas/Revision'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    GardenListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Garden'
        nextCursor:
          type: string
          description: Opaque continuation token. Absent when no further page exists.

    CreateGardenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    RenameGardenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Freshly obtained Firebase ID token, verified server-side before any cookie is issued.

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          description: Stable machine-readable detail code.
        pointer:
          type: string
          description: JSON Pointer to the offending member, where the error is structural.
        parameters:
          type: object
          additionalProperties: true
          description: Values interpolated into the localized message. Never free-form prose.

    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, correlationId, retryable]
          properties:
            code:
              type: string
              description: |
                Stable dotted code. Clients localize known errors by this value
                rather than by displaying `message`.
              examples: ['garden.geometry.stale_revision']
            message:
              type: string
              description: Safe fallback text in English. Not a localization source.
            correlationId:
              type: string
              description: Identifier for correlating this response with server telemetry.
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
            retryable:
              type: boolean
              description: Whether repeating the identical request may succeed later.

    LivenessResult:
      type: object
      additionalProperties: false
      required: [status, version]
      properties:
        status:
          type: string
          enum: [alive]
        version:
          type: string
          description: Build version of the running artifact.

    DependencyStatus:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
          examples: ['database']
        status:
          type: string
          enum: [available, unavailable]
        detail:
          type: string
          description: Non-sensitive summary. Never contains connection strings or credentials.

    ReadinessResult:
      type: object
      additionalProperties: false
      required: [status, version, dependencies]
      properties:
        status:
          type: string
          enum: [ready, notReady]
        version:
          type: string
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'

    CoordinateSpaceKind:
      type: string
      enum: [localPlanarMetres, geographicWgs84]
      description: |
        Which space a geometry's coordinates belong to. Local planar coordinates
        are metres from a garden-specific origin and are never EPSG:4326.

        Source: ADR-0010.

    Position:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: number
      description: |
        Coordinate pair. In local planar space this is metres east and metres
        north of the garden origin, rounded to 1 mm.

    Geometry:
      oneOf:
        - $ref: '#/components/schemas/PointGeometry'
        - $ref: '#/components/schemas/LineStringGeometry'
        - $ref: '#/components/schemas/PolygonGeometry'
        - $ref: '#/components/schemas/MultiLineStringGeometry'
        - $ref: '#/components/schemas/MultiPolygonGeometry'
      discriminator:
        propertyName: type

    PointGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          $ref: '#/components/schemas/Position'

    LineStringGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [LineString]
        coordinates:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Position'

    PolygonGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          minItems: 1
          description: First ring is the exterior ring; any further rings are holes.
          items:
            type: array
            minItems: 4
            items:
              $ref: '#/components/schemas/Position'

    MultiLineStringGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiLineString]
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 2
            items:
              $ref: '#/components/schemas/Position'

    MultiPolygonGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiPolygon]
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 1
            items:
              type: array
              minItems: 4
              items:
                $ref: '#/components/schemas/Position'

    ProvenanceKind:
      type: string
      enum:
        - manualDrawing
        - userMeasurement
        - importedPlan
        - importedMapImagery
        - arMeasurement
        - imageExtraction
        - depthCapture
        - externalProvider
        - processor
      description: |
        How a piece of geometry came to exist. Generated results additionally
        reference processor and model versions elsewhere in the record.

        Source: architecture/data-and-geospatial-design.md, section "12. Provenance".

    CurveMetadata:
      type: object
      additionalProperties: false
      required: [kind, controlPoints, chordDeviationMetres]
      description: |
        Advisory. Consumers that ignore this still receive correct geometry from
        the densified `geometry` member.
      properties:
        kind:
          type: string
          enum: [cubicBezier]
        controlPoints:
          type: array
          minItems: 4
          items:
            $ref: '#/components/schemas/Position'
        chordDeviationMetres:
          type: number
          exclusiveMinimum: 0

    GeometryEnvelope:
      type: object
      additionalProperties: false
      required: [geometry, coordinateSpaceId, coordinateSpaceKind, provenance]
      description: |
        The only form in which geometry crosses this API. A bare GeoJSON object
        is never sufficient, because it cannot state its coordinate space.
      properties:
        geometry:
          $ref: '#/components/schemas/Geometry'
        coordinateSpaceId:
          $ref: '#/components/schemas/Uuid'
        coordinateSpaceKind:
          $ref: '#/components/schemas/CoordinateSpaceKind'
        provenance:
          $ref: '#/components/schemas/ProvenanceKind'
        curve:
          $ref: '#/components/schemas/CurveMetadata'
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Absent means "not expressed", not "certain".

  responses:
    BadRequest:
      description: The request is malformed or fails validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Authenticated but not authorized for this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: |
        Not found, or existence intentionally concealed because the actor is not
        authorized to learn that the resource exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: A domain or synchronization conflict prevented the command.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    PreconditionFailed:
      description: The supplied revision precondition did not match the current revision.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    TooManyRequests:
      description: A quota or rate limit was exceeded.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Unexpected internal failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

security:
  - firebaseIdToken: []
  - sessionCookie: []
