        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: taskId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: completeTask
      tags: [Tasks]
      summary: Complete a task
      description: |
        Transitions the task to `'completed'` and stamps `completedAt`.
        Terminal: only legal while `'planned'` or `'suggested'`. Never
        records an observation on the caller's behalf — that is a separate
        `RecordObservation` call the caller makes on its own if it wants one.
        `completionNote` is accepted for interface completeness but has no
        storage target this pass; it still binds the idempotency fingerprint.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteTaskRequest'
      responses:
        '200':
          description: The completed task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/tasks/{taskId}/dismiss:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: taskId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: dismissTask
      tags: [Tasks]
      summary: Dismiss a task
      description: |
        Transitions the task to `'dismissed'` — "not doing this at all."
        Terminal: only legal while `'planned'` or `'suggested'`. `reason` is
        accepted for interface completeness but has no storage target this
        pass, the same carve-out `completionNote` documents.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DismissTaskRequest'
      responses:
        '200':
          description: The dismissed task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/tasks/{taskId}/skip:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: taskId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: skipTask
      tags: [Tasks]
      summary: Skip a task
      description: |
        Transitions the task to `'skipped'` — "not doing this occurrence,"
        distinct in intent from `dismiss`'s "not doing this at all," though
        both are plain terminal transitions with no further data attached.
        Terminal: only legal while `'planned'` or `'suggested'`.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The skipped task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/tasks/{taskId}/delete:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: taskId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: deleteTask
      tags: [Tasks]
      summary: Delete a task
      description: |
        Transitions the task to `'deleted'`. `POST`, not HTTP `DELETE`: this
        module has no hard-delete anywhere — deleting a task is a status
        transition, the exact same shape as `SetPlantStatus('removed')` and
        the map's own `deleteObject` command — and every other terminal
        transition on this resource (`complete`, `dismiss`, `skip`) is
        already a `POST` sub-resource action for the same reason. Using
        HTTP `DELETE` for only this one transition, while its four siblings
        stay `POST`, would read as this task alone supporting a hard delete
        it does not have; consistency with its siblings was chosen over the
        more literal HTTP verb. Terminal: only legal while `'planned'` or
        `'suggested'`.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The deleted (soft) task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/tasks/{taskId}/attachments:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: taskId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: attachTaskFile
      tags: [Tasks]
      summary: Attach a file to a task
      description: |
        Appends a file. Never changes the task's own revision — an
        attachment is a child record, not a field of the task itself — so
        this command carries no `If-Match` precondition, the same as
        `AttachPlantPhoto`.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachTaskFileRequest'
      responses:
        '201':
          description: The attached file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAttachment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  securitySchemes:
    firebaseIdToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Firebase ID token presented by the native client.

        Source: architecture/identity-and-authorization.md, section
        "4. Native Authentication Flow".
    sessionCookie:
      type: apiKey
      in: cookie
      name: __session
      description: |
        HTTP-only Firebase session cookie used by the web client. Cookie
        authenticated mutations additionally require CSRF protection.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow".

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-generated UUIDv7. The same key with a semantically identical
        request returns the original result. The same key with a different
        command is rejected with `request.idempotency.key_reused`.
      schema:
        $ref: '#/components/schemas/Uuid'

    IfMatch:
      name: If-Match
      in: header
      required: true
      description: |
        Expected revision of the target resource, quoted. A stale value is
        rejected rather than silently overwriting a newer state.
      schema:
        type: string
        examples: ['"7"']

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque continuation token from a previous page. Clients must not parse it.
      schema:
        type: string
        maxLength: 512

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum items to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  headers:
    ETag:
      description: Current revision of the returned resource, quoted.
      schema:
        type: string
    RetryAfter:
      description: Seconds to wait before retrying.
      schema:
        type: integer
        minimum: 0

  schemas:
    Uuid:
      type: string
      format: uuid
      description: Opaque UUIDv7 identifier. Time ordering is an index property, not an authoritative creation time.
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      examples: ['019827ab-4c1d-7e3f-9a2b-5c6d7e8f9a0b']

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp in UTC.
      examples: ['2026-07-22T09:15:00Z']

    Revision:
      type: integer
      format: int64
      minimum: 1
      description: Monotonically increasing server revision within one object's identity.

    GardenLifecycleState:
      type: string
      enum: [active, archived, deletionRequested]
      description: |
        `deletionRequested` starts the deletion workflow; it is not immediate
        deletion. No `deleted` value exists yet: nothing can reach it before
        the purge workflow that would produce it is built.

        Source: architecture/data-and-geospatial-design.md, section "15. Deletion".

    GardenRole:
      type: string
      enum: [owner, editor, viewer]
      description: |
        The authenticated caller's own role on this garden. Informational for
        client UI only — the server re-evaluates authorization on every
        request and never trusts a client-submitted role.

        Source: architecture/identity-and-authorization.md, section "8. Garden Roles".

    Garden:
      type: object
      additionalProperties: false
      required: [id, name, lifecycleState, callerRole, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
          minLength: 1
          maxLength: 120
        lifecycleState:
          $ref: '#/components/schemas/GardenLifecycleState'
        callerRole:
          $ref: '#/components/schemas/GardenRole'
        revision:
          $ref: '#/components/schemas/Revision'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    GardenListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Garden'
        nextCursor:
          type: string
          description: Opaque continuation token. Absent when no further page exists.

    CreateGardenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    RenameGardenRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Freshly obtained Firebase ID token, verified server-side before any cookie is issued.

    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          description: Stable machine-readable detail code.
        pointer:
          type: string
          description: JSON Pointer to the offending member, where the error is structural.
        parameters:
          type: object
          additionalProperties: true
          description: Values interpolated into the localized message. Never free-form prose.

    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, correlationId, retryable]
          properties:
            code:
              type: string
              description: |
                Stable dotted code. Clients localize known errors by this value
                rather than by displaying `message`.
              examples: ['garden.geometry.stale_revision']
            message:
              type: string
              description: Safe fallback text in English. Not a localization source.
            correlationId:
              type: string
              description: Identifier for correlating this response with server telemetry.
            details:
              type: array
              items:
                $ref: '#/components/schemas/ErrorDetail'
            retryable:
              type: boolean
              description: Whether repeating the identical request may succeed later.

    LivenessResult:
      type: object
      additionalProperties: false
      required: [status, version]
      properties:
        status:
          type: string
          enum: [alive]
        version:
          type: string
          description: Build version of the running artifact.

    DependencyStatus:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
          examples: ['database']
        status:
          type: string
          enum: [available, unavailable]
        detail:
          type: string
          description: Non-sensitive summary. Never contains connection strings or credentials.

    ReadinessResult:
      type: object
      additionalProperties: false
      required: [status, version, dependencies]
      properties:
        status:
          type: string
          enum: [ready, notReady]
        version:
          type: string
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'

    CoordinateSpaceKind:
      type: string
      enum: [localPlanarMetres, geographicWgs84]
      description: |
        Which space a geometry's coordinates belong to. Local planar coordinates
        are metres from a garden-specific origin and are never EPSG:4326.

        Source: ADR-0010.

    Position:
      type: array
      minItems: 2
      maxItems: 2
      items:
        type: number
      description: |
        Coordinate pair. In local planar space this is metres east and metres
        north of the garden origin, rounded to 1 mm.

    Geometry:
      oneOf:
        - $ref: '#/components/schemas/PointGeometry'
        - $ref: '#/components/schemas/LineStringGeometry'
        - $ref: '#/components/schemas/PolygonGeometry'
        - $ref: '#/components/schemas/MultiLineStringGeometry'
        - $ref: '#/components/schemas/MultiPolygonGeometry'
      discriminator:
        propertyName: type
        # Without explicit mapping, openapi-typescript sets each branch's
        # discriminator literal to the referenced schema's *name*
        # ("PointGeometry") instead of the actual wire value ("Point"),
        # making the generated type unusable for narrowing real JSON.
        # Confirmed directly: this surfaced building the map module's
        # generated-client consumers.
        mapping:
          Point: '#/components/schemas/PointGeometry'
          LineString: '#/components/schemas/LineStringGeometry'
          Polygon: '#/components/schemas/PolygonGeometry'
          MultiLineString: '#/components/schemas/MultiLineStringGeometry'
          MultiPolygon: '#/components/schemas/MultiPolygonGeometry'

    PointGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          $ref: '#/components/schemas/Position'

    LineStringGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [LineString]
        coordinates:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Position'

    PolygonGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Polygon]
        coordinates:
          type: array
          minItems: 1
          description: First ring is the exterior ring; any further rings are holes.
          items:
            type: array
            minItems: 4
            items:
              $ref: '#/components/schemas/Position'

    MultiLineStringGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiLineString]
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 2
            items:
              $ref: '#/components/schemas/Position'

    MultiPolygonGeometry:
      type: object
      additionalProperties: false
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiPolygon]
        coordinates:
          type: array
          minItems: 1
          items:
            type: array
            minItems: 1
            items:
              type: array
              minItems: 4
              items:
                $ref: '#/components/schemas/Position'

    ProvenanceKind:
      type: string
      enum:
        - manualDrawing
        - userMeasurement
        - importedPlan
        - importedMapImagery
        - arMeasurement
        - imageExtraction
        - depthCapture
        - externalProvider
        - processor
      description: |
        How a piece of geometry came to exist. Generated results additionally
        reference processor and model versions elsewhere in the record.

        Source: architecture/data-and-geospatial-design.md, section "12. Provenance".

    CurveMetadata:
      type: object
      additionalProperties: false
      required: [kind, controlPoints, chordDeviationMetres]
      description: |
        Advisory. Consumers that ignore this still receive correct geometry from
        the densified `geometry` member.
      properties:
        kind:
          type: string
          enum: [cubicBezier]
        controlPoints:
          type: array
          minItems: 4
          items:
            $ref: '#/components/schemas/Position'
        chordDeviationMetres:
          type: number
          exclusiveMinimum: 0

    GeometryEnvelope:
      type: object
      additionalProperties: false
      required: [geometry, coordinateSpaceId, coordinateSpaceKind, provenance]
      description: |
        The only form in which geometry crosses this API. A bare GeoJSON object
        is never sufficient, because it cannot state its coordinate space.
      properties:
        geometry:
          $ref: '#/components/schemas/Geometry'
        coordinateSpaceId:
          $ref: '#/components/schemas/Uuid'
        coordinateSpaceKind:
          $ref: '#/components/schemas/CoordinateSpaceKind'
        provenance:
          $ref: '#/components/schemas/ProvenanceKind'
        curve:
          $ref: '#/components/schemas/CurveMetadata'
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Absent means "not expressed", not "certain".

    GardenObjectCategory:
      type: string
      enum:
        - lot
        - structure
        - fence
        - gate
        - path
        - zone
        - bed
        - waterFeature
        - utilityExclusion
        - tree
        - plant
        - annotation
        - importedBackground
      description: |
        Source: architecture/map-rendering-and-editing.md, section
        "4. Canonical Object Categories".

    MeasurementUnit:
      type: string
      enum: [metres, squareMetres, degrees]

    MeasurementAcquisitionMethod:
      type: string
      enum:
        - userEntered
        - derivedFromGeometry
        - arMeasurement
        - imageExtraction
        - depthCapture
        - importedPlan

    Measurement:
      type: object
      additionalProperties: false
      required: [value, unit, acquisitionMethod]
      description: |
        The schema must not imply survey accuracy merely because a value
        uses a precise numeric type — every measurement carries how it was
        acquired.

        Source: architecture/data-and-geospatial-design.md, section
        "11. Measurements and Uncertainty".
      properties:
        value:
          type: number
          description: Canonical SI value in `unit`.
        unit:
          $ref: '#/components/schemas/MeasurementUnit'
        acquisitionMethod:
          $ref: '#/components/schemas/MeasurementAcquisitionMethod'
        originalEntry:
          type: string
          description: As the user typed it, before conversion — for example "40 ft".
        uncertainty:
          type: number
          description: Absolute uncertainty in the same unit as `value`.
        referenceObjectId:
          $ref: '#/components/schemas/Uuid'
        calibrationRevision:
          $ref: '#/components/schemas/Revision'

    StructureDetails:
      type: object
      additionalProperties: false
      required: [category, structureKind]
      properties:
        category:
          type: string
          enum: [structure]
        structureKind:
          type: string
          enum: [house, shed, greenhouse, deck, garage, other]
        heightMetres:
          type: number
          exclusiveMinimum: 0

    FenceDetails:
      type: object
      additionalProperties: false
      required: [category, fenceKind]
      properties:
        category:
          type: string
          enum: [fence]
        fenceKind:
          type: string
          enum: [wood, chainLink, vinyl, metal, hedge, other]
        heightMetres:
          type: number
          exclusiveMinimum: 0

    GateDetails:
      type: object
      additionalProperties: false
      required: [category, fenceObjectId]
      description: A gate is always positioned along exactly one fence.
      properties:
        category:
          type: string
          enum: [gate]
        fenceObjectId:
          $ref: '#/components/schemas/Uuid'
        widthMetres:
          type: number
          exclusiveMinimum: 0

    ZoneDetails:
      type: object
      additionalProperties: false
      required: [category, zoneKind]
      properties:
        category:
          type: string
          enum: [zone]
        zoneKind:
          type: string
          enum: [lawn, garden, mulch, gravel, groundCover, other]

    BedDetails:
      type: object
      additionalProperties: false
      required: [category, bedKind]
      properties:
        category:
          type: string
          enum: [bed]
        bedKind:
          type: string
          enum: [inGround, raised, container]
        soilNotes:
          type: string
          maxLength: 2000

    TreeDetails:
      type: object
      additionalProperties: false
      required: [category]
      description: |
        The canopy is a second, optional geometry — distinct from the trunk
        position carried by the object's own `geometryEnvelope`.
      properties:
        category:
          type: string
          enum: [tree]
        canopyGeometry:
          $ref: '#/components/schemas/Geometry'
        commonName:
          type: string
          maxLength: 200
        estimatedHeightMetres:
          type: number
          exclusiveMinimum: 0
        estimatedSpreadMetres:
          type: number
          exclusiveMinimum: 0

    PlantPlacementDetails:
      type: object
      additionalProperties: false
      required: [category, commonName, quantity]
      description: |
        Deliberately without a plant-catalog reference: the species and care
        catalog is Phase 4 scope.
      properties:
        category:
          type: string
          enum: [plant]
        commonName:
          type: string
          minLength: 1
          maxLength: 200
        quantity:
          type: integer
          minimum: 1
        spacingMetres:
          type: number
          exclusiveMinimum: 0
        assignedToObjectId:
          $ref: '#/components/schemas/Uuid'

    UtilityExclusionDetails:
      type: object
      additionalProperties: false
      required: [category, utilityExclusionKind]
      properties:
        category:
          type: string
          enum: [utilityExclusion]
        utilityExclusionKind:
          type: string
          enum: [undergroundUtility, septicField, wellRadius, setback, other]
        notes:
          type: string
          maxLength: 2000

    AnnotationDetails:
      type: object
      additionalProperties: false
      required: [category]
      description: Where a `Measurement` attaches — the "Annotation and measurement reference" category.
      properties:
        category:
          type: string
          enum: [annotation]
        measurement:
          $ref: '#/components/schemas/Measurement'

    GardenObjectDetails:
      oneOf:
        - $ref: '#/components/schemas/StructureDetails'
        - $ref: '#/components/schemas/FenceDetails'
        - $ref: '#/components/schemas/GateDetails'
        - $ref: '#/components/schemas/ZoneDetails'
        - $ref: '#/components/schemas/BedDetails'
        - $ref: '#/components/schemas/TreeDetails'
        - $ref: '#/components/schemas/PlantPlacementDetails'
        - $ref: '#/components/schemas/UtilityExclusionDetails'
        - $ref: '#/components/schemas/AnnotationDetails'
      discriminator:
        propertyName: category
        # See Geometry's discriminator comment: mapping to the actual wire
        # values, not schema names, is required for the generated type to
        # narrow real JSON correctly.
        mapping:
          structure: '#/components/schemas/StructureDetails'
          fence: '#/components/schemas/FenceDetails'
          gate: '#/components/schemas/GateDetails'
          zone: '#/components/schemas/ZoneDetails'
          bed: '#/components/schemas/BedDetails'
          tree: '#/components/schemas/TreeDetails'
          plant: '#/components/schemas/PlantPlacementDetails'
          utilityExclusion: '#/components/schemas/UtilityExclusionDetails'
          annotation: '#/components/schemas/AnnotationDetails'
      description: |
        Present only for categories that have specialized fields. `lot`,
        `path`, `waterFeature`, and `importedBackground` carry no
        `details` member.

    GardenObjectLifecycleState:
      type: string
      enum: [active, deleted]

    GardenObject:
      type: object
      additionalProperties: false
      required:
        [id, gardenId, category, geometryEnvelope, lifecycleState, revision, createdAt, updatedAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          $ref: '#/components/schemas/Uuid'
        category:
          $ref: '#/components/schemas/GardenObjectCategory'
        geometryEnvelope:
          $ref: '#/components/schemas/GeometryEnvelope'
        label:
          type: string
          maxLength: 200
        details:
          $ref: '#/components/schemas/GardenObjectDetails'
        lifecycleState:
          $ref: '#/components/schemas/GardenObjectLifecycleState'
        revision:
          $ref: '#/components/schemas/Revision'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    ValidationSeverity:
      type: string
      enum: [error, warning]

    ValidationIssue:
      type: object
      additionalProperties: false
      required: [code, severity]
      description: |
        Warnings do not block a save unless the corresponding rule protects
        data integrity or safety.

        Source: architecture/map-rendering-and-editing.md, section
        "11. Validation".
      properties:
        code:
          type: string
          description: Stable machine-readable code, localized client-side.
        severity:
          $ref: '#/components/schemas/ValidationSeverity'
        affectedObjectIds:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
        geometry:
          $ref: '#/components/schemas/Geometry'
          description: The offending geometry, when the issue is localizable to a shape rather than a whole object.

    Georeference:
      type: object
      additionalProperties: false
      required:
        [
          localAnchor,
          geographicAnchor,
          rotationDegrees,
          scaleCorrection,
          provenance,
          method,
          revision,
        ]
      properties:
        localAnchor:
          $ref: '#/components/schemas/Position'
        geographicAnchor:
          $ref: '#/components/schemas/Position'
          description: Longitude, latitude — WGS84.
        rotationDegrees:
          type: number
        scaleCorrection:
          type: number
          exclusiveMinimum: 0
        accuracyMetres:
          type: number
          minimum: 0
        provenance:
          $ref: '#/components/schemas/ProvenanceKind'
        method:
          type: string
        revision:
          $ref: '#/components/schemas/Revision'

    GardenMapDocument:
      type: object
      additionalProperties: false
      required: [coordinateSpaceId, objects, validationSummary]
      description: |
        Source: architecture/map-rendering-and-editing.md, section
        "6. Hybrid Data Model".
      properties:
        coordinateSpaceId:
          $ref: '#/components/schemas/Uuid'
        georeference:
          $ref: '#/components/schemas/Georeference'
        objects:
          type: array
          items:
            $ref: '#/components/schemas/GardenObject'
        validationSummary:
          type: array
          items:
            $ref: '#/components/schemas/ValidationIssue'

    VertexOperation:
      type: string
      enum: [insert, move, remove]

    ProposalDecision:
      type: string
      enum: [accept, modifyAndAccept, reject]

    CreateMapObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, category, geometry]
      properties:
        type:
          type: string
          enum: [createObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        category:
          $ref: '#/components/schemas/GardenObjectCategory'
        geometry:
          $ref: '#/components/schemas/Geometry'
        label:
          type: string
          maxLength: 200
        categoryDetails:
          $ref: '#/components/schemas/GardenObjectDetails'

    MoveObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, translationMetres]
      properties:
        type:
          type: string
          enum: [moveObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        translationMetres:
          type: object
          additionalProperties: false
          required: [dx, dy]
          properties:
            dx:
              type: number
            dy:
              type: number

    ReplaceGeometryCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, geometry]
      description: What a resize, rotate, or freehand reshape gesture commits as.
      properties:
        type:
          type: string
          enum: [replaceGeometry]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        geometry:
          $ref: '#/components/schemas/Geometry'

    EditVertexCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, operation, ringIndex, vertexIndex]
      properties:
        type:
          type: string
          enum: [editVertex]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        operation:
          $ref: '#/components/schemas/VertexOperation'
        ringIndex:
          type: integer
          minimum: 0
        vertexIndex:
          type: integer
          minimum: 0
        position:
          $ref: '#/components/schemas/Position'
          description: Required for `insert` and `move`; absent for `remove`.

    SplitLineworkCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision, resultObjectIds, atVertexIndex]
      properties:
        type:
          type: string
          enum: [splitLinework]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        resultObjectIds:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/Uuid'
        atVertexIndex:
          type: integer
          minimum: 0

    JoinLineworkCommand:
      type: object
      additionalProperties: false
      required:
        [
          type,
          firstObjectId,
          firstExpectedRevision,
          secondObjectId,
          secondExpectedRevision,
          resultObjectId,
        ]
      properties:
        type:
          type: string
          enum: [joinLinework]
        firstObjectId:
          $ref: '#/components/schemas/Uuid'
        firstExpectedRevision:
          $ref: '#/components/schemas/Revision'
        secondObjectId:
          $ref: '#/components/schemas/Uuid'
        secondExpectedRevision:
          $ref: '#/components/schemas/Revision'
        resultObjectId:
          $ref: '#/components/schemas/Uuid'

    ChangePropertiesCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision]
      properties:
        type:
          type: string
          enum: [changeProperties]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        label:
          type: string
          maxLength: 200
        categoryDetails:
          $ref: '#/components/schemas/GardenObjectDetails'

    AssignPlantCommand:
      type: object
      additionalProperties: false
      required: [type, plantObjectId, expectedRevision, targetObjectId]
      properties:
        type:
          type: string
          enum: [assignPlant]
        plantObjectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'
        targetObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
          description: '`null` unassigns the plant from any zone or bed.'

    UpsertCalibrationCommand:
      type: object
      additionalProperties: false
      required: [type, backgroundObjectId, referencePoints]
      properties:
        type:
          type: string
          enum: [upsertCalibration]
        backgroundObjectId:
          $ref: '#/components/schemas/Uuid'
        referencePoints:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [imagePixel, localMetres]
            properties:
              imagePixel:
                $ref: '#/components/schemas/Position'
              localMetres:
                $ref: '#/components/schemas/Position'

    DecideProposalCommand:
      type: object
      additionalProperties: false
      required: [type, proposalId, decision]
      properties:
        type:
          type: string
          enum: [decideProposal]
        proposalId:
          $ref: '#/components/schemas/Uuid'
        decision:
          $ref: '#/components/schemas/ProposalDecision'
        editedGeometry:
          $ref: '#/components/schemas/Geometry'
          description: Required only for `modifyAndAccept`.

    DeleteObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision]
      properties:
        type:
          type: string
          enum: [deleteObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'

    RestoreObjectCommand:
      type: object
      additionalProperties: false
      required: [type, objectId, expectedRevision]
      properties:
        type:
          type: string
          enum: [restoreObject]
        objectId:
          $ref: '#/components/schemas/Uuid'
        expectedRevision:
          $ref: '#/components/schemas/Revision'

    DuplicateObjectCommand:
      type: object
      additionalProperties: false
      required: [type, sourceObjectId, newObjectId, offsetMetres]
      properties:
        type:
          type: string
          enum: [duplicateObject]
        sourceObjectId:
          $ref: '#/components/schemas/Uuid'
        newObjectId:
          $ref: '#/components/schemas/Uuid'
        offsetMetres:
          type: object
          additionalProperties: false
          required: [dx, dy]
          properties:
            dx:
              type: number
            dy:
              type: number

    MapCommandPayload:
      oneOf:
        - $ref: '#/components/schemas/CreateMapObjectCommand'
        - $ref: '#/components/schemas/MoveObjectCommand'
        - $ref: '#/components/schemas/ReplaceGeometryCommand'
        - $ref: '#/components/schemas/EditVertexCommand'
        - $ref: '#/components/schemas/SplitLineworkCommand'
        - $ref: '#/components/schemas/JoinLineworkCommand'
        - $ref: '#/components/schemas/ChangePropertiesCommand'
        - $ref: '#/components/schemas/AssignPlantCommand'
        - $ref: '#/components/schemas/UpsertCalibrationCommand'
        - $ref: '#/components/schemas/DecideProposalCommand'
        - $ref: '#/components/schemas/DeleteObjectCommand'
        - $ref: '#/components/schemas/RestoreObjectCommand'
        - $ref: '#/components/schemas/DuplicateObjectCommand'
      discriminator:
        propertyName: type
        # See Geometry's discriminator comment: mapping to the actual wire
        # values, not schema names, is required for the generated type to
        # narrow real JSON correctly.
        mapping:
          createObject: '#/components/schemas/CreateMapObjectCommand'
          moveObject: '#/components/schemas/MoveObjectCommand'
          replaceGeometry: '#/components/schemas/ReplaceGeometryCommand'
          editVertex: '#/components/schemas/EditVertexCommand'
          splitLinework: '#/components/schemas/SplitLineworkCommand'
          joinLinework: '#/components/schemas/JoinLineworkCommand'
          changeProperties: '#/components/schemas/ChangePropertiesCommand'
          assignPlant: '#/components/schemas/AssignPlantCommand'
          upsertCalibration: '#/components/schemas/UpsertCalibrationCommand'
          decideProposal: '#/components/schemas/DecideProposalCommand'
          deleteObject: '#/components/schemas/DeleteObjectCommand'
          restoreObject: '#/components/schemas/RestoreObjectCommand'
          duplicateObject: '#/components/schemas/DuplicateObjectCommand'

    MapCommandRequest:
      type: object
      additionalProperties: false
      required: [commandId, clientTimestamp, payload]
      properties:
        commandId:
          $ref: '#/components/schemas/Uuid'
        clientTimestamp:
          $ref: '#/components/schemas/Timestamp'
        payload:
          $ref: '#/components/schemas/MapCommandPayload'

    MapCommandResult:
      type: object
      additionalProperties: false
      required: [affectedObjects]
      properties:
        affectedObjects:
          type: array
          items:
            $ref: '#/components/schemas/GardenObject'

    PlantGroupingKind:
      type: string
      enum: [individual, row, group]
      description: Whether `Plant` tracks a single instance, a row, or a group as one record.

    PlantAcquisitionDateType:
      type: string
      enum: [planted, sown, acquired]

    PlantLifecycleStage:
      type: string
      enum:
        - planned
        - seed
        - seedling
        - transplanted
        - growing
        - flowering
        - fruiting
        - ready_to_harvest
      description: |
        No ordering is enforced: any stage is reachable from any other, and
        transitioning to the stage already held is accepted as a legitimate,
        if inert, command.

    PlantStatus:
      type: string
      enum: [active, dormant, archived, removed, dead]
      description: |
        The axis orthogonal to `PlantLifecycleStage`. There is no hard-delete
        command for a plant — removing one from active inventory is a
        transition to `removed` or `dead` here.

    TaxonomySource:
      type: string
      enum: [system_catalog, user_defined]
      description: Whether a taxonomy reference was seeded independently of any profile, or defined by one.

    Plant:
      type: object
      additionalProperties: false
      required:
        [
          id,
          gardenId,
          gardenAreaMapObjectId,
          placementMapObjectId,
          displayName,
          taxonomyReferenceId,
          varietyLabel,
          acceptedIdentificationId,
          acquisitionDate,
          acquisitionDateType,
          groupingKind,
          quantity,
          lifecycleStage,
          status,
          conditionNote,
          careGuidanceNote,
          revision,
          createdByProfileId,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          $ref: '#/components/schemas/Uuid'
        gardenAreaMapObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        placementMapObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        taxonomyReferenceId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        varietyLabel:
          type: [string, 'null']
        acceptedIdentificationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        acquisitionDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        acquisitionDateType:
          oneOf:
            - $ref: '#/components/schemas/PlantAcquisitionDateType'
            - type: 'null'
        groupingKind:
          $ref: '#/components/schemas/PlantGroupingKind'
        quantity:
          oneOf:
            - type: integer
              minimum: 1
            - type: 'null'
        lifecycleStage:
          $ref: '#/components/schemas/PlantLifecycleStage'
        status:
          $ref: '#/components/schemas/PlantStatus'
        conditionNote:
          type: [string, 'null']
        careGuidanceNote:
          type: [string, 'null']
        revision:
          $ref: '#/components/schemas/Revision'
        createdByProfileId:
          $ref: '#/components/schemas/Uuid'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'

    PlantPhoto:
      type: object
      additionalProperties: false
      required: [id, plantId, mediaId, isPrimary, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        plantId:
          $ref: '#/components/schemas/Uuid'
        mediaId:
          $ref: '#/components/schemas/Uuid'
        isPrimary:
          type: boolean
        createdAt:
          $ref: '#/components/schemas/Timestamp'

    TaxonomyReference:
      type: object
      additionalProperties: false
      required: [id, scientificName, commonName, varietyName, source, createdByProfileId, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        scientificName:
          type: string
        commonName:
          type: [string, 'null']
        varietyName:
          type: [string, 'null']
        source:
          $ref: '#/components/schemas/TaxonomySource'
        createdByProfileId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        createdAt:
          $ref: '#/components/schemas/Timestamp'

    TaxonomyReferenceListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaxonomyReference'

    AddPlantRequest:
      type: object
      additionalProperties: false
      required: [displayName, groupingKind]
      description: 'Mirrors `AddPlantInput`. Source: plants-inventory/application/add-plant.ts.'
      properties:
        gardenAreaMapObjectId:
          $ref: '#/components/schemas/Uuid'
        placementMapObjectId:
          $ref: '#/components/schemas/Uuid'
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        taxonomyReferenceId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        varietyLabel:
          type: [string, 'null']
        acquisitionDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        acquisitionDateType:
          oneOf:
            - $ref: '#/components/schemas/PlantAcquisitionDateType'
            - type: 'null'
        groupingKind:
          $ref: '#/components/schemas/PlantGroupingKind'
        quantity:
          oneOf:
            - type: integer
              minimum: 1
            - type: 'null'
          description: Required and greater than zero unless `groupingKind` is `individual`, which must leave this unset.

    AddPlantFromPhotoRequest:
      type: object
      additionalProperties: false
      required: [photoMediaId]
      description: 'Mirrors `AddPlantFromPhotoInput`. Source: plants-inventory/application/add-plant-from-photo.ts.'
      properties:
        gardenAreaMapObjectId:
          $ref: '#/components/schemas/Uuid'
        placementMapObjectId:
          $ref: '#/components/schemas/Uuid'
        photoMediaId:
          $ref: '#/components/schemas/Uuid'

    UpdatePlantDetailsRequest:
      type: object
      additionalProperties: false
      description: |
        Mirrors `PlantDetailsChanges`. Every property is optional; an omitted
        property leaves the current value unchanged, and an explicit `null`
        on a nullable property clears it. Source:
        plants-inventory/domain/plant.ts.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        taxonomyReferenceId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        varietyLabel:
          type: [string, 'null']
        acquisitionDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        acquisitionDateType:
          oneOf:
            - $ref: '#/components/schemas/PlantAcquisitionDateType'
            - type: 'null'
        conditionNote:
          type: [string, 'null']
        careGuidanceNote:
          type: [string, 'null']
        quantity:
          oneOf:
            - type: integer
              minimum: 1
            - type: 'null'

    AttachPlantPhotoRequest:
      type: object
      additionalProperties: false
      required: [mediaId]
      properties:
        mediaId:
          $ref: '#/components/schemas/Uuid'
        isPrimary:
          type: boolean
          default: false

    TransitionPlantLifecycleStageRequest:
      type: object
      additionalProperties: false
      required: [stage]
      properties:
        stage:
          $ref: '#/components/schemas/PlantLifecycleStage'

    SetPlantStatusRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/PlantStatus'

    MovePlantRequest:
      type: object
      additionalProperties: false
      description: 'Mirrors `MovePlantInput`. Source: plants-inventory/application/move-plant.ts.'
      properties:
        gardenAreaMapObjectId:
          $ref: '#/components/schemas/Uuid'
        placementMapObjectId:
          $ref: '#/components/schemas/Uuid'

    ObservationActorType:
      type: string
      enum: [user, system]

    ObservationCorrectionKind:
      type: string
      enum: [amendment, supersede]

    ImageAnalysisKind:
      type: string
      enum: [stress, disease, pest, other]

    ImageAnalysisResult:
      type: object
      additionalProperties: false
      required:
        [
          id,
          analysisKind,
          suggestedLabel,
          confidenceScore,
          requiresConfirmation,
          requestedAdditionalEvidence,
          createdAt,
        ]
      description: |
        A stubbed, honest placeholder: `requiresConfirmation` is always
        `true` — an automated diagnosis is never presented as a confirmed
        fact without explicit user confirmation.
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        analysisKind:
          $ref: '#/components/schemas/ImageAnalysisKind'
        suggestedLabel:
          type: string
        confidenceScore:
          type: number
          minimum: 0
          maximum: 1
        requiresConfirmation:
          type: boolean
        requestedAdditionalEvidence:
          type: boolean
        createdAt:
          $ref: '#/components/schemas/Timestamp'

    ObservationPhoto:
      type: object
      additionalProperties: false
      required: [id, mediaId, createdAt, analysisResults]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        mediaId:
          $ref: '#/components/schemas/Uuid'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        analysisResults:
          type: array
          items:
            $ref: '#/components/schemas/ImageAnalysisResult'

    Observation:
      type: object
      additionalProperties: false
      required:
        [
          id,
          gardenId,
          plantId,
          gardenObjectId,
          actorType,
          createdByProfileId,
          noteText,
          conditionSummary,
          correctionKind,
          correctsObservationId,
          isCorrected,
          observedAt,
          recordedAt,
          photos,
        ]
      description: |
        Immutable and append-only — no revision, no update path. A
        correction is a separate row (see `correctionKind`/
        `correctsObservationId`), never an edit of this one.
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          $ref: '#/components/schemas/Uuid'
        plantId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        gardenObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        actorType:
          $ref: '#/components/schemas/ObservationActorType'
        createdByProfileId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        noteText:
          type: [string, 'null']
        conditionSummary:
          type: [string, 'null']
        correctionKind:
          oneOf:
            - $ref: '#/components/schemas/ObservationCorrectionKind'
            - type: 'null'
        correctsObservationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        isCorrected:
          type: boolean
          description: Whether a later observation names this one in its own `correctsObservationId`.
        observedAt:
          $ref: '#/components/schemas/Timestamp'
        recordedAt:
          $ref: '#/components/schemas/Timestamp'
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ObservationPhoto'

    ObservationListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Observation'

    RecordObservationRequest:
      type: object
      additionalProperties: false
      description: |
        Mirrors `RecordObservationInput`. At least one of `noteText`,
        `conditionSummary`, or a `photoMediaIds` entry is required, enforced
        server-side. Source: observations-history/application/record-observation.ts.
      properties:
        plantId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        gardenObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        noteText:
          type: [string, 'null']
        conditionSummary:
          type: [string, 'null']
        observedAt:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
          description: '`null` or omitted means "use the server''s own timestamp."'
        photoMediaIds:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
          default: []

    CorrectObservationRequest:
      type: object
      additionalProperties: false
      required: [correctionKind]
      description: 'Mirrors `CorrectObservationInput`. Source: observations-history/application/correct-observation.ts.'
      properties:
        correctionKind:
          $ref: '#/components/schemas/ObservationCorrectionKind'
        noteText:
          type: [string, 'null']
        conditionSummary:
          type: [string, 'null']
        photoMediaIds:
          type: array
          items:
            $ref: '#/components/schemas/Uuid'
          default: []

    TaskTargetKind:
      type: string
      enum: [garden, garden_area, plant]

    TaskStatus:
      type: string
      enum: [planned, suggested, completed, skipped, dismissed, deleted]
      description: |
        `planned` and `suggested` are the only two statuses a task's status
        or details may still be changed from; the other four are terminal.

    TaskUrgency:
      type: string
      enum: [low, normal, high, urgent]

    TaskSource:
      type: string
      enum: [manual, suggested]
      description: This API only ever creates `manual` tasks; `suggested` would originate from a recommendation entity this phase does not build.

    Task:
      type: object
      additionalProperties: false
      required:
        [
          id,
          gardenId,
          targetKind,
          targetGardenAreaMapObjectId,
          targetPlantId,
          title,
          notes,
          status,
          dueDate,
          timeWindowStart,
          timeWindowEnd,
          recurrenceRule,
          urgency,
          source,
          originObservationId,
          revision,
          createdByProfileId,
          createdAt,
          updatedAt,
          completedAt,
        ]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gardenId:
          $ref: '#/components/schemas/Uuid'
        targetKind:
          $ref: '#/components/schemas/TaskTargetKind'
        targetGardenAreaMapObjectId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        targetPlantId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        title:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: [string, 'null']
        status:
          $ref: '#/components/schemas/TaskStatus'
        dueDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        timeWindowStart:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        timeWindowEnd:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        recurrenceRule:
          type: [string, 'null']
          description: Stored only; never parsed, expanded, or validated this pass.
        urgency:
          $ref: '#/components/schemas/TaskUrgency'
        source:
          $ref: '#/components/schemas/TaskSource'
        originObservationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
        revision:
          $ref: '#/components/schemas/Revision'
        createdByProfileId:
          $ref: '#/components/schemas/Uuid'
        createdAt:
          $ref: '#/components/schemas/Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Timestamp'
        completedAt:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'

    TaskAttachment:
      type: object
      additionalProperties: false
      required: [id, taskId, mediaId, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        taskId:
          $ref: '#/components/schemas/Uuid'
        mediaId:
          $ref: '#/components/schemas/Uuid'
        createdAt:
          $ref: '#/components/schemas/Timestamp'

    TaskListResult:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'

    TaskTimeWindowInput:
      type: object
      additionalProperties: false
      description: Shared by `CreateManualTaskRequest`, `EditTaskRequest`, and `RescheduleTaskRequest`.
      properties:
        start:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        end:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'

    CreateManualTaskRequest:
      type: object
      additionalProperties: false
      required: [target, title]
      description: 'Mirrors `CreateManualTaskInput`. Source: tasks-recommendations/application/create-manual-task.ts.'
      properties:
        target:
          type: object
          additionalProperties: false
          required: [kind]
          description: |
            Mirrors the migration's `task_target_consistency_check`: `kind:
            garden` sets neither id; `kind: garden_area` sets only
            `gardenAreaMapObjectId`; `kind: plant` sets only `plantId`.
          properties:
            kind:
              $ref: '#/components/schemas/TaskTargetKind'
            gardenAreaMapObjectId:
              $ref: '#/components/schemas/Uuid'
            plantId:
              $ref: '#/components/schemas/Uuid'
        title:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: [string, 'null']
        dueDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        timeWindow:
          $ref: '#/components/schemas/TaskTimeWindowInput'
        urgency:
          $ref: '#/components/schemas/TaskUrgency'
        originObservationId:
          oneOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
          description: Must name an observation belonging to this same garden.

    EditTaskRequest:
      type: object
      additionalProperties: false
      description: |
        Mirrors `EditTaskChanges`. Every property is optional; an omitted
        property leaves the current value unchanged, and an explicit `null`
        on a nullable property clears it. Source
        tasks-recommendations/application/edit-task.ts.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: [string, 'null']
        dueDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        timeWindow:
          $ref: '#/components/schemas/TaskTimeWindowInput'
        urgency:
          $ref: '#/components/schemas/TaskUrgency'
        recurrenceRule:
          type: [string, 'null']

    RescheduleTaskRequest:
      type: object
      additionalProperties: false
      description: 'Mirrors `RescheduleTaskInput`. Source: tasks-recommendations/application/reschedule-task.ts.'
      properties:
        dueDate:
          oneOf:
            - type: string
              format: date
            - type: 'null'
        timeWindow:
          $ref: '#/components/schemas/TaskTimeWindowInput'

    CompleteTaskRequest:
      type: object
      additionalProperties: false
      description: '`completionNote` is accepted for interface completeness but has no storage target this pass — it still binds the idempotency fingerprint.'
      properties:
        completionNote:
          type: [string, 'null']

    DismissTaskRequest:
      type: object
      additionalProperties: false
      description: '`reason` is accepted for interface completeness but has no storage target this pass, the same carve-out `CompleteTaskRequest.completionNote` documents.'
      properties:
        reason:
          type: [string, 'null']

    AttachTaskFileRequest:
      type: object
      additionalProperties: false
      required: [mediaId]
      properties:
        mediaId:
          $ref: '#/components/schemas/Uuid'

  responses:
    BadRequest:
      description: The request is malformed or fails validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Authenticated but not authorized for this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: |
        Not found, or existence intentionally concealed because the actor is not
        authorized to learn that the resource exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: A domain or synchronization conflict prevented the command.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    PreconditionFailed:
      description: The supplied revision precondition did not match the current revision.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    TooManyRequests:
      description: A quota or rate limit was exceeded.
      headers:
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Unexpected internal failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

security:
  - firebaseIdToken: []
  - sessionCookie: []
