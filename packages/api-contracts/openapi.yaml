openapi: 3.1.0

info:
  title: Verdery API
  version: 1.0.0
  summary: Garden mapping, care records, and recommendations
  description: |
    The external contract shared by the native Apple and web applications.

    This document is the machine-readable source of truth for paths, schemas,
    error envelopes, pagination, idempotency, and concurrency headers. Generated
    clients are wrapped by handwritten application gateways and are never edited
    by hand.

    Conventions:

    - Paths use plural lowercase nouns; JSON fields use `camelCase`.
    - Identifiers are opaque UUIDv7 strings.
    - Timestamps are RFC 3339 in UTC.
    - Measurements are SI with explicit unit metadata where ambiguity exists.
    - Geometry always travels inside an envelope naming its coordinate space,
      because GeoJSON alone cannot say whether coordinates are local metres or
      longitude and latitude.

    Source: architecture/api-design.md.
  license:
    name: UNLICENSED
    identifier: LicenseRef-Proprietary

servers:
  - url: /v1
    description: Version 1

tags:
  - name: Operations
    description: Service health and readiness, used by infrastructure rather than by end users.
  - name: Gardens
    description: Garden lifecycle — list, create, view, rename, archive, and request deletion.
  - name: Authentication
    description: Web session exchange for the browser client. Native clients use a Firebase ID token directly and never call these.
  - name: Map
    description: The canonical 2D garden map — objects, their categories and geometry, and the single revision-aware command endpoint that mutates them.
  - name: Plants
    description: Plant inventory within a garden — placement on the map, photos, taxonomy identification, lifecycle stage, and status.
  - name: Observations
    description: The append-only garden and plant observation history, including per-photo image-analysis results and immutable corrections.
  - name: Tasks
    description: Garden care tasks — manual creation, scheduling, completion, and file attachments.

paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Operations]
      summary: Liveness probe
      description: |
        Reports whether the process is running. Never checks dependencies, so a
        degraded database does not cause the platform to restart a healthy
        process.
      security: []
      responses:
        '200':
          description: The process is running.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResult'
        '500':
          $ref: '#/components/responses/InternalError'

  /health/ready:
    get:
      operationId: getReadiness
      tags: [Operations]
      summary: Readiness probe
      description: |
        Reports whether the service can serve traffic, including its required
        dependencies. Returns `503` when a required dependency is unavailable so
        that the platform stops routing requests to this instance.
      security: []
      responses:
        '200':
          description: The service is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResult'
        '503':
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResult'

  /auth/session:
    post:
      operationId: createSession
      tags: [Authentication]
      summary: Exchange a Firebase ID token for a web session
      description: |
        The browser signs in with a Firebase provider client-side, then
        submits the resulting ID token here. The server verifies it and
        responds with a `Secure`, `HttpOnly` session cookie plus a
        readable CSRF cookie; the ID token itself never becomes a
        persistent browser credential.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow".
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '204':
          description: Session established. Cookies are set on the response.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      operationId: endSession
      tags: [Authentication]
      summary: Log out
      description: |
        Clears the session and CSRF cookies and revokes the underlying
        Firebase refresh tokens. Idempotent: succeeds even when no valid
        session cookie is present, so a client can always clear a broken
        session state.

        Source: architecture/identity-and-authorization.md, section
        "5. Web Session Flow", step 6.
      security: []
      responses:
        '204':
          description: Session cleared.
        '403':
          $ref: '#/components/responses/Forbidden'

  /gardens:
    get:
      operationId: listGardens
      tags: [Gardens]
      summary: List the caller's gardens
      description: |
        Returns every garden the authenticated profile has active membership
        in, most recently created first, regardless of lifecycle state.

        Source: implementation-plan.md work package P2-API-01.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: The caller's gardens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createGarden
      tags: [Gardens]
      summary: Create a garden
      description: |
        Creates a garden and grants the caller the owner role on it in the
        same transaction. Every garden has exactly one owner at creation.

        Source: implementation-plan.md work package P2-API-01;
        architecture/identity-and-authorization.md, section "8. Garden Roles".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGardenRequest'
      responses:
        '201':
          description: The created garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getGarden
      tags: [Gardens]
      summary: Get a garden
      description: |
        Returns a garden the caller has active membership in. Existence is
        concealed as `404` for a profile with no membership on this garden.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01.
      responses:
        '200':
          description: The requested garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: renameGarden
      tags: [Gardens]
      summary: Rename a garden
      description: |
        Renaming is an owner-only garden setting, distinct from editing garden
        content. Existence is concealed as `404` for a non-member; an editor
        or viewer member instead receives `403`, since they already know the
        garden exists.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01;
        architecture/identity-and-authorization.md, section "8. Garden Roles".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameGardenRequest'
      responses:
        '200':
          description: The renamed garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/archive:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: archiveGarden
      tags: [Gardens]
      summary: Archive a garden
      description: |
        Owner-only lifecycle command. Archiving an already-archived garden
        under a new idempotency key is a domain conflict, not a silent no-op.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The archived garden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/delete-request:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: requestGardenDeletion
      tags: [Gardens]
      summary: Request garden deletion
      description: |
        Owner-only lifecycle command. Starts the deletion workflow; it does
        not delete the garden immediately. Purge after the recovery window is
        a separate, not-yet-implemented asynchronous workflow.

        Source: implementation-plan.md work packages P2-API-01, P2-SEC-01;
        architecture/data-and-geospatial-design.md, section "15. Deletion".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The garden, now in the deletion_requested lifecycle state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Garden'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/map:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: minX
        in: query
        required: false
        description: |
          Viewport bounding box in garden-local metres, for large gardens.
          All four bounds are required together or omitted together; a
          partial set is a `400`.
        schema:
          type: number
      - name: minY
        in: query
        required: false
        schema:
          type: number
      - name: maxX
        in: query
        required: false
        schema:
          type: number
      - name: maxY
        in: query
        required: false
        schema:
          type: number

    get:
      operationId: getGardenMap
      tags: [Map]
      summary: Get the canonical garden map
      description: |
        Returns every active object in the garden's local coordinate space,
        its optional georeference, and a validation summary. Omitting the
        bounding box parameters returns the whole garden — appropriate for
        small and ordinary gardens; large gardens should pass a viewport.

        Source: implementation-plan.md work packages P3-BE-01, P3-DATA-02;
        architecture/map-rendering-and-editing.md, section "6. Hybrid Data Model".
      responses:
        '200':
          description: The garden's map document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GardenMapDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /gardens/{gardenId}/map/commands:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: submitMapCommand
      tags: [Map]
      summary: Submit one canonical map editor command
      description: |
        A single revision-aware endpoint for every map editing command —
        create, move, replace geometry, edit a vertex, split or join
        linework, change properties, assign a plant, upsert a calibration,
        decide a proposal, delete, restore, or duplicate — rather than one
        REST endpoint per command type. Every command that targets an
        existing object carries its own expected revision in its payload
        (not an `If-Match` header), because some commands, such as joining
        two lines, target more than one object at once and need more than
        one expected revision.

        `actorProfileId` and `actorType` are never read from the request
        body; the server fills them from the authenticated caller, the same
        rule every other mutation in this API follows.

        Source: implementation-plan.md work package P3-BE-01;
        architecture/map-rendering-and-editing.md, section
        "7. Editor Command Model".
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MapCommandRequest'
      responses:
        '200':
          description: The object or objects the command affected, at their new revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapCommandResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: addPlant
      tags: [Plants]
      summary: Add a plant
      description: |
        Adds a plant instance, row, or group to the garden's inventory.
        `taxonomyReferenceId` may be set directly here when the caller already
        knows the species; otherwise leave it unset and identify the plant
        later via a photo or `SearchTaxonomyReferences`.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlantRequest'
      responses:
        '201':
          description: The created plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/from-photo:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: addPlantFromPhoto
      tags: [Plants]
      summary: Add a plant identified from a photo
      description: |
        Creates an `'individual'` plant prefilled from a photo-identification
        pass, and inserts the photo and the identification suggestion in the
        same transaction. `taxonomyReferenceId` on the created plant stays
        unset until the suggestion is confirmed via `ConfirmPlantIdentification`
        — identification never auto-confirms.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPlantFromPhotoRequest'
      responses:
        '201':
          description: The created plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: getPlant
      tags: [Plants]
      summary: Get a plant
      description: |
        Returns a plant in a garden the caller has active membership in.
        Existence — including a plant id that belongs to a different garden
        than the one named in the path — is concealed as `404`.

        Source: implementation-plan.md work package P4-CONTRACT-01.
      responses:
        '200':
          description: The requested plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updatePlantDetails
      tags: [Plants]
      summary: Update plant details
      description: |
        Revision-guarded edit of identity, acquisition, and care-note fields.
        Every property is optional; an omitted property leaves the current
        value unchanged, while an explicit `null` on a nullable property
        clears it. `groupingKind` is immutable and not editable here.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlantDetailsRequest'
      responses:
        '200':
          description: The updated plant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants/{plantId}/photos:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: attachPlantPhoto
      tags: [Plants]
      summary: Attach a photo to a plant
      description: |
        Appends a photo. Never changes the plant's own revision — a photo is
        a child record, not a field of the plant itself — so this command
        carries no `If-Match` precondition.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachPlantPhotoRequest'
      responses:
        '201':
          description: The attached photo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlantPhoto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}/photos/{plantPhotoId}/primary:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantPhotoId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: setPrimaryPlantPhoto
      tags: [Plants]
      summary: Set a plant's primary photo
      description: |
        Clears any existing primary photo for this plant, then marks this one
        primary, in the same transaction. Does not change the plant's own
        revision, so this command carries no `If-Match` precondition, the
        same as `AttachPlantPhoto`.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: The now-primary photo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlantPhoto'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}/identification/{identificationId}/confirm:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: identificationId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: confirmPlantIdentification
      tags: [Plants]
      summary: Confirm a photo-identification suggestion
      description: |
        Accepts a prior `plant_identification` suggestion, setting the
        plant's `taxonomyReferenceId` and `acceptedIdentificationId`. The
        named identification must belong to the named plant, or the request
        is rejected.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '200':
          description: The plant with its identification confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants/{plantId}/lifecycle-stage:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: transitionPlantLifecycleStage
      tags: [Plants]
      summary: Transition a plant's lifecycle stage
      description: |
        Sets `lifecycleStage` to any of the eight stages; no ordering is
        enforced, and transitioning to the stage already held is accepted as
        a legitimate, if inert, command.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionPlantLifecycleStageRequest'
      responses:
        '200':
          description: The plant at its new lifecycle stage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants/{plantId}/status:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: setPlantStatus
      tags: [Plants]
      summary: Set a plant's status
      description: |
        Sets `status`, the axis orthogonal to `lifecycleStage`. There is no
        hard-delete command for a plant — removing one from active inventory
        is a transition to `'removed'` or `'dead'` here.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPlantStatusRequest'
      responses:
        '200':
          description: The plant at its new status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/plants/{plantId}/move:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: movePlant
      tags: [Plants]
      summary: Move a plant to a different map placement
      description: |
        Updates the plant's placement fields only. Both, when given, must
        reference an active map object in the plant's own garden — the
        garden itself never changes; there is no "move to a different
        garden" command.

        Source: implementation-plan.md work packages P4-BE-01, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovePlantRequest'
      responses:
        '200':
          description: The plant at its new placement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /gardens/{gardenId}/taxonomy-references:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: query
        in: query
        required: false
        description: Case-insensitive match against scientific, common, or variety name. Omit to list the catalog, most recent first.
        schema:
          type: string
          maxLength: 200
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20

    get:
      operationId: searchTaxonomyReferences
      tags: [Plants]
      summary: Search the taxonomy reference catalog
      description: |
        Reads `plants_inventory.taxonomy_reference`, the read-only species
        catalog `AddPlant` callers pick a `taxonomyReferenceId` from. Not
        scoped to `gardenId` and carries no authorization check of its own —
        the catalog is not garden-owned data, the same way a product catalog
        is not owned by any one customer, so any authenticated caller may
        search it; `gardenId` is present only for URL consistency with every
        other route under this garden and is validated for shape but
        otherwise unused. Consequently this operation never returns `403` or
        a garden-related `404`.

        Source: implementation-plan.md work package P4-CONTRACT-01.
      responses:
        '200':
          description: Matching taxonomy references.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxonomyReferenceListResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /gardens/{gardenId}/observations:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: recordObservation
      tags: [Observations]
      summary: Record an observation
      description: |
        Records a note, a condition summary, and/or photos about the garden,
        a plant within it, or an area (`gardenObjectId`), running one stubbed
        image-analysis pass per attached photo in the same transaction. At
        least one of `noteText`, `conditionSummary`, or a photo is required.

        Source: implementation-plan.md work packages P4-BE-02, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordObservationRequest'
      responses:
        '201':
          description: The recorded observation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Observation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    get:
      operationId: listObservationsForGarden
      tags: [Observations]
      summary: List a garden's observation history
      description: |
        Every observation recorded in the garden, most recently observed
        first, correction rows included.

        Source: implementation-plan.md work packages P4-BE-02, P4-CONTRACT-01.
      responses:
        '200':
          description: The garden's observation history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationListResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /observations/{observationId}/corrections:
    parameters:
      - name: observationId
        in: path
        required: true
        description: The observation being corrected.
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: correctObservation
      tags: [Observations]
      summary: Correct an observation
      description: |
        Inserts a new observation row that points backward to the one it
        corrects; the original is never edited or superseded in place. No
        `gardenId` in the path — the garden is discovered from the original
        observation itself, the same way the command layer resolves it.

        Source: implementation-plan.md work packages P4-BE-02, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectObservationRequest'
      responses:
        '201':
          description: The correction observation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Observation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /gardens/{gardenId}/plants/{plantId}/observations:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: plantId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    get:
      operationId: listObservationsForPlant
      tags: [Observations]
      summary: List a plant's observation history
      description: |
        Every observation recorded for one plant, most recently observed
        first, correction rows included. A `plantId` with no observations
        returns an empty list rather than `404`; only an unknown or
        not-visible `gardenId` produces `404`.

        Source: implementation-plan.md work packages P4-BE-02, P4-CONTRACT-01.
      responses:
        '200':
          description: The plant's observation history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationListResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /gardens/{gardenId}/tasks:
    parameters:
      - name: gardenId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'

    post:
      operationId: createManualTask
      tags: [Tasks]
      summary: Create a manual task
      description: |
        Creates a task with `source: 'manual'` — the only kind this API
        creates; a `'suggested'` task would originate from a recommendation
        entity this phase does not build. `originObservationId`, when given,
        must name an observation that belongs to this garden.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManualTaskRequest'
