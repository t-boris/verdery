          description: The created task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    get:
      operationId: listTasksForGarden
      tags: [Tasks]
      summary: List a garden's tasks
      description: |
        Every task in the garden, optionally restricted to the given
        statuses, soonest-due first (undated tasks last), then by urgency
        descending, then by creation order.

        Source: implementation-plan.md work packages P4-BE-03, P4-CONTRACT-01.
      parameters:
        - name: status
          in: query
          required: false
          description: Comma-separated statuses to include. Omit to return every status.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/TaskStatus'
