        - $ref: '#/components/schemas/SyncCompleteTaskCommand'
        - $ref: '#/components/schemas/SyncDismissTaskCommand'
        - $ref: '#/components/schemas/SyncSkipTaskCommand'
        - $ref: '#/components/schemas/SyncDeleteTaskCommand'
        - $ref: '#/components/schemas/SyncAttachTaskFileCommand'
      discriminator:
        propertyName: commandType
